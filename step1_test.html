<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Step 1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>


/* ═══ CSS VARIABLES ═══ */
:root {
  --serif: 'Playfair Display', Georgia, serif;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
  --sans: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
  --navy: #0d1b2a;
  --navy-mid: #162436;
  --navy-light: #1e3148;
  --cream: #f0ead8;
  --cream-dim: #9aabbf;
  --gold: #c9a84c;
  --gold-dim: #8a6f2e;
  --green: #2dba72;
  --red: #d94f4f;
  --amber: #e08c2a;
  --rule: rgba(201,168,76,.18);
}

/* ═══ RESET & BASE ═══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--navy); color: var(--cream); font-family: var(--sans); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: var(--gold); text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: var(--gold); color: var(--navy); }

/* ═══ HEADER ═══ */
.site-header { border-bottom: 1px solid var(--rule); padding: 20px 48px; display: flex; align-items: center; gap: 32px; }
.wordmark { font-family: var(--serif); font-weight: 700; color: #b8c8d8; line-height: 1.15; text-decoration: none; }
.wordmark .line1 { display: block; font-size: 26px; }
.wordmark .line2 { display: block; font-size: 22px; padding-left: 1.1em; }
.header-tagline { font-family: var(--mono); font-size: 10px; color: var(--cream-dim); letter-spacing: .1em; text-transform: uppercase; margin-left: auto; }

/* ═══ PAGE LAYOUT ═══ */
.page { max-width: 1400px; margin: 0 auto; padding: 44px 48px 80px; }
.page-title h1 { font-family: var(--serif); font-size: 34px; font-weight: 900; line-height: 1.1; }
.page-title .subtitle { font-family: var(--mono); font-size: 11px; color: var(--gold); letter-spacing: .15em; text-transform: uppercase; margin-top: 6px; }
.dim { color: var(--cream-dim); }
.green { color: var(--green); }
.red { color: var(--red); }
.gold { color: var(--gold); }
.amber { color: var(--amber); }

/* ═══ SEARCH BAR ═══ */
.search-wrap { margin-top: 28px; position: relative; }
.search-input {
  width: 100%; background: var(--navy-mid); border: 1px solid var(--rule);
  color: var(--cream); font-family: var(--mono); font-size: 14px; padding: 14px 18px 14px 44px;
  outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--cream-dim); opacity: .6; }
.search-icon {
  position: absolute; left: 16px; top: 15px;
  color: var(--cream-dim); font-size: 15px; pointer-events: none;
  font-style: normal; line-height: 1;
}
.search-hint {
  font-family: var(--mono); font-size: 10px; color: var(--cream-dim);
  letter-spacing: .06em; margin-top: 8px; opacity: .7;
}
.search-hint span { color: var(--gold); }

/* ═══ FILTER PILLS ═══ */
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
.filter-pill {
  font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
  padding: 5px 10px; border: 1px solid var(--rule); background: transparent;
  color: var(--cream-dim); cursor: pointer; transition: all .15s; user-select: none;
}
.filter-pill:hover { border-color: var(--gold); color: var(--cream); }
.filter-pill.active { background: rgba(201,168,76,.12); border-color: var(--gold); color: var(--gold); }

/* ═══ SEARCH RESULTS ═══ */
.results-wrap { margin-top: 24px; display: none; }
.results-header {
  font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--gold); padding-bottom: 8px; border-bottom: 1px solid var(--rule); margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.results-count { color: var(--cream-dim); }
.result-item {
  display: flex; align-items: flex-start; gap: 14px; padding: 10px 0;
  border-bottom: 1px solid rgba(201,168,76,.07);
}
.result-item:hover { background: rgba(201,168,76,.02); }
.result-date {
  font-family: var(--mono); font-size: 11px; color: var(--cream-dim);
  white-space: nowrap; min-width: 90px; padding-top: 2px;
}
.result-body { flex: 1; min-width: 0; }
.result-term { font-family: var(--sans); font-size: 14px; color: var(--cream); font-weight: 500; }
.result-term mark { background: rgba(201,168,76,.25); color: var(--cream); padding: 0 2px; }
.result-detail { font-family: var(--mono); font-size: 11px; color: var(--cream-dim); margin-top: 2px; }
.result-badge {
  display: inline-block; font-family: var(--mono); font-size: 8px; letter-spacing: .08em;
  text-transform: uppercase; padding: 2px 6px; margin-left: 8px; vertical-align: middle;
}
.badge-bonus { background: rgba(45,186,114,.15); color: var(--green); }
.badge-discount { background: rgba(201,168,76,.15); color: var(--gold); }
.badge-vehicle { background: rgba(160,180,200,.1); color: var(--cream-dim); }
.badge-gun { background: rgba(217,79,79,.12); color: var(--red); }
.badge-event { background: rgba(224,140,42,.15); color: var(--amber); }
.badge-fib { background: rgba(160,180,200,.08); color: var(--cream-dim); }

/* ═══ STATS PANEL (for searched items) ═══ */
.stats-panel {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--rule);
  border: 1px solid var(--rule); margin-bottom: 18px;
}
.stat-card { background: var(--navy-mid); padding: 16px 14px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--cream); line-height: 1; margin-bottom: 4px; }
.stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--cream-dim); }

/* ═══ SECTION LABEL ═══ */
.section { margin-top: 36px; }
.section-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--rule);
}

/* ═══ TIMELINE ═══ */
.timeline { margin-top: 14px; }
.week-card {
  border: 1px solid var(--rule); margin-bottom: 8px; transition: all .15s; cursor: pointer;
}
.week-card:hover { border-color: rgba(201,168,76,.35); }
.week-card.expanded { border-color: var(--gold); }
.week-header {
  display: flex; align-items: center; gap: 14px; padding: 14px 18px;
  background: var(--navy-mid);
}
.week-date {
  font-family: var(--mono); font-size: 12px; color: var(--gold);
  white-space: nowrap; width: 140px; flex-shrink: 0;
}
.week-date .week-dur {
  font-size: 9px; color: var(--cream-dim); margin-left: 6px; letter-spacing: .04em;
}
.week-name {
  font-family: var(--sans); font-size: 13px; color: var(--cream); font-weight: 500;
  flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.week-tags { display: flex; gap: 5px; flex-wrap: wrap; flex-shrink: 0; max-width: 560px; }
.week-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--mono); font-size: 9px; letter-spacing: .04em; text-transform: uppercase;
  padding: 2px 7px; white-space: nowrap; cursor: pointer;
}
.week-tag.g { background: rgba(45,186,114,.12); color: var(--green); }
.week-tag.o { background: rgba(201,168,76,.12); color: var(--gold); }
.week-tag.r { background: rgba(217,79,79,.12); color: var(--red); }
.week-tag .tag-mult { font-weight: 500; }
.week-meta {
  display: flex; gap: 12px; font-family: var(--mono); font-size: 9px;
  color: var(--cream-dim); letter-spacing: .04em; flex-shrink: 0;
}
.week-expand-icon {
  font-family: var(--mono); font-size: 14px; color: var(--cream-dim);
  transition: transform .2s; margin-left: 8px;
}
.week-card.expanded .week-expand-icon { transform: rotate(90deg); }

/* Week detail panel */
.week-detail {
  display: none; padding: 0 18px 18px; background: var(--navy-mid);
  border-top: 1px solid var(--rule);
}
.week-card.expanded .week-detail { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 14px; }
.detail-section {}
.detail-section-title {
  font-family: var(--mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--rule);
}
.detail-item {
  font-family: var(--sans); font-size: 12px; color: var(--cream); padding: 3px 0;
  display: flex; align-items: baseline; gap: 6px;
}
.detail-item .d-label { color: var(--cream-dim); font-family: var(--mono); font-size: 10px; }
.detail-item .d-mult { font-family: var(--mono); font-size: 10px; color: var(--green); font-weight: 500; }
.detail-item .d-pct { font-family: var(--mono); font-size: 10px; color: var(--gold); font-weight: 500; }
.sl { cursor: pointer; transition: color .1s; }
.sl:hover { color: var(--gold); }
.overlay-badge {
  display: inline-block; font-family: var(--mono); font-size: 8px; letter-spacing: .06em;
  text-transform: uppercase; padding: 2px 6px; background: rgba(224,140,42,.15);
  color: var(--amber); margin-bottom: 8px; margin-right: 4px;
}

/* ═══ VERDICT BOX ═══ */
.verdict {
  border: 1px solid var(--rule); border-left: 3px solid var(--gold);
  padding: 18px 22px; margin-top: 28px; background: rgba(201,168,76,.02);
}
.verdict-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 10px;
}
.verdict p { font-size: 13px; color: var(--cream); line-height: 1.7; margin-bottom: 7px; }
.verdict p:last-child { margin-bottom: 0; }
.verdict em { color: var(--cream-dim); font-style: normal; }

/* ═══ NO RESULTS ═══ */
.no-results {
  text-align: center; padding: 40px 20px; color: var(--cream-dim);
  font-family: var(--sans); font-size: 14px;
}
.no-results .nr-icon { font-size: 32px; margin-bottom: 12px; opacity: .4; }
.no-results .nr-term { color: var(--cream); font-weight: 500; }

/* ═══ FEEDBACK ═══ */
.feedback-btn { position: fixed; bottom: 22px; right: 22px; background: var(--navy-mid); border: 1px solid var(--rule); color: var(--gold); padding: 9px 16px; font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; transition: all .15s; z-index: 100; }
.feedback-btn:hover { background: var(--gold); color: var(--navy); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--navy-mid); border: 1px solid var(--rule); width: 500px; max-width: calc(100vw - 40px); max-height: 90vh; overflow-y: auto; padding: 28px; }
.modal-title { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--cream); margin-bottom: 4px; }
.modal-sub { font-family: var(--mono); font-size: 10px; color: var(--cream-dim); letter-spacing: .08em; margin-bottom: 22px; }
.modal-label { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; display: block; }
.modal-textarea { width: 100%; background: var(--navy); border: 1px solid var(--rule); color: var(--cream); font-family: var(--sans); font-size: 13px; padding: 10px 12px; resize: vertical; min-height: 90px; line-height: 1.6; outline: none; }
.modal-textarea:focus { border-color: var(--gold); }
.screenshot-zone { width: 100%; min-height: 80px; background: var(--navy); border: 1px dashed rgba(201,168,76,.35); display: flex; align-items: center; justify-content: center; margin-top: 14px; cursor: pointer; position: relative; overflow: hidden; transition: border-color .15s; }
.screenshot-zone:hover { border-color: var(--gold); }
.screenshot-zone.has-image { border-style: solid; border-color: var(--gold); }
.screenshot-zone img { max-width: 100%; max-height: 220px; display: block; }
.screenshot-hint { font-family: var(--mono); font-size: 10px; color: var(--cream-dim); letter-spacing: .06em; text-align: center; padding: 20px; pointer-events: none; }
.screenshot-hint span { color: var(--gold); }
.screenshot-clear { position: absolute; top: 6px; right: 8px; background: var(--navy-mid); border: 1px solid var(--rule); color: var(--cream-dim); font-family: var(--mono); font-size: 10px; padding: 2px 8px; cursor: pointer; display: none; }
.screenshot-zone.has-image .screenshot-clear { display: block; }
.modal-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; gap: 12px; }
.modal-send-btn { background: var(--gold); border: none; color: var(--navy); font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; padding: 10px 22px; cursor: pointer; transition: all .15s; font-weight: 500; }
.modal-send-btn:hover { background: var(--cream); }
.modal-send-btn:disabled { opacity: .4; cursor: not-allowed; }
.modal-cancel-btn { background: none; border: 1px solid var(--rule); color: var(--cream-dim); font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; padding: 10px 16px; cursor: pointer; transition: all .15s; }
.modal-cancel-btn:hover { border-color: var(--cream-dim); color: var(--cream); }
.modal-status { font-family: var(--mono); font-size: 11px; color: var(--cream-dim); min-height: 16px; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 900px) {
  .page { padding: 24px 20px 80px; }
  .site-header { padding: 14px 20px; }
  .header-tagline { display: none; }
  .stats-panel { grid-template-columns: 1fr 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
  .week-header { flex-wrap: wrap; gap: 8px; }
  .week-tags { max-width: 100%; }
  .week-meta { display: none; }
}
@media (max-width: 540px) {
  .stats-panel { grid-template-columns: 1fr; }
  .page-title h1 { font-size: 28px; }
  .feedback-btn { bottom: 16px; right: 16px; padding: 8px 12px; }
  .week-date { min-width: auto; }
}


</style>
</head>

function doSearch(query) {

  var list = document.getElementById('results-list');

  var tlSection = document.getElementById('timeline-section');

  list.innerHTML = h;
}
