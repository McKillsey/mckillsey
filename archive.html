<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Archive — McKillsey & Company</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Playfair Display', Georgia, serif;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
  --sans: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
  --navy: #0d1b2a;
  --navy-mid: #162436;
  --navy-light: #1e3148;
  --cream: #f0ead8;
  --cream-dim: #9aabbf;
  --gold: #c9a84c;
  --gold-dim: #8a6f2e;
  --green: #2dba72;
  --red: #d94f4f;
  --amber: #e08c2a;
  --rule: rgba(201,168,76,.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--navy); color: var(--cream); font-family: var(--sans); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: var(--gold); text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: var(--gold); color: var(--navy); }
.site-header { border-bottom: 1px solid var(--rule); padding: 20px 48px; display: flex; align-items: center; gap: 32px; }
.wordmark { font-family: var(--serif); font-weight: 700; color: #b8c8d8; line-height: 1.15; text-decoration: none; }
.wordmark .line1 { display: block; font-size: 26px; }
.wordmark .line2 { display: block; font-size: 22px; padding-left: 1.1em; }
.header-tagline { font-family: var(--mono); font-size: 10px; color: var(--cream-dim); letter-spacing: .1em; text-transform: uppercase; margin-left: auto; }
.page { max-width: 1400px; margin: 0 auto; padding: 44px 48px 80px; }
.page-title h1 { font-family: var(--serif); font-size: 34px; font-weight: 900; line-height: 1.1; }
.page-title .subtitle { font-family: var(--mono); font-size: 11px; color: var(--gold); letter-spacing: .15em; text-transform: uppercase; margin-top: 6px; }
.dim { color: var(--cream-dim); }
.green { color: var(--green); }
.red { color: var(--red); }
.gold { color: var(--gold); }
.amber { color: var(--amber); }
.search-wrap { margin-top: 28px; position: relative; }
.search-input { width: 100%; background: var(--navy-mid); border: 1px solid var(--rule); color: var(--cream); font-family: var(--mono); font-size: 14px; padding: 14px 18px 14px 44px; outline: none; transition: border-color .15s; }
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: var(--cream-dim); opacity: .6; }
.search-icon { position: absolute; left: 16px; top: 15px; color: var(--cream-dim); font-size: 15px; pointer-events: none; font-style: normal; line-height: 1; }
.search-hint { font-family: var(--mono); font-size: 10px; color: var(--cream-dim); letter-spacing: .06em; margin-top: 8px; opacity: .7; }
.search-hint span { color: var(--gold); cursor: pointer; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
.filter-pill { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; padding: 5px 10px; border: 1px solid var(--rule); background: transparent; color: var(--cream-dim); cursor: pointer; transition: all .15s; user-select: none; }
.filter-pill:hover { border-color: var(--gold); color: var(--cream); }
.filter-pill.active { background: rgba(201,168,76,.12); border-color: var(--gold); color: var(--gold); }
.results-wrap { margin-top: 24px; display: none; }
.results-header { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); padding-bottom: 8px; border-bottom: 1px solid var(--rule); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.results-count { color: var(--cream-dim); }
.result-item { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; border-bottom: 1px solid rgba(201,168,76,.07); }
.result-item:hover { background: rgba(201,168,76,.02); }
.result-date { font-family: var(--mono); font-size: 11px; color: var(--cream-dim); white-space: nowrap; min-width: 90px; padding-top: 2px; }
.result-body { flex: 1; min-width: 0; }
.result-term { font-family: var(--sans); font-size: 14px; color: var(--cream); font-weight: 500; }
.result-term mark { background: rgba(201,168,76,.25); color: var(--cream); padding: 0 2px; }
.result-detail { font-family: var(--mono); font-size: 11px; color: var(--cream-dim); margin-top: 2px; }
.result-badge { display: inline-block; font-family: var(--mono); font-size: 8px; letter-spacing: .08em; text-transform: uppercase; padding: 2px 6px; margin-left: 8px; vertical-align: middle; }
.badge-bonus { background: rgba(45,186,114,.15); color: var(--green); }
.badge-discount { background: rgba(201,168,76,.15); color: var(--gold); }
.badge-vehicle { background: rgba(160,180,200,.1); color: var(--cream-dim); }
.badge-gun { background: rgba(217,79,79,.12); color: var(--red); }
.badge-event { background: rgba(224,140,42,.15); color: var(--amber); }
.badge-fib { background: rgba(160,180,200,.08); color: var(--cream-dim); }
.stats-panel { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-bottom: 18px; }
.stat-card { background: var(--navy-mid); padding: 16px 14px; }
.stat-value { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--cream); line-height: 1; margin-bottom: 4px; }
.stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--cream-dim); }
.section { margin-top: 36px; }
.section-label { font-family: var(--mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--rule); }
.timeline { margin-top: 14px; }
.week-card { border: 1px solid var(--rule); margin-bottom: 8px; transition: all .15s; cursor: pointer; }
.week-card:hover { border-color: rgba(201,168,76,.35); }
.week-card.expanded { border-color: var(--gold); }
.week-header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--navy-mid); }
.week-date { font-family: var(--mono); font-size: 12px; color: var(--gold); white-space: nowrap; width: 140px; flex-shrink: 0; }
.week-date .week-dur { font-size: 9px; color: var(--cream-dim); margin-left: 6px; letter-spacing: .04em; }
.week-name { font-family: var(--sans); font-size: 13px; color: var(--cream); font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.week-tags { display: flex; gap: 5px; flex-wrap: wrap; flex-shrink: 0; max-width: 560px; }
.week-tag { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 9px; letter-spacing: .04em; text-transform: uppercase; padding: 2px 7px; white-space: nowrap; cursor: pointer; }
.week-tag.g { background: rgba(45,186,114,.12); color: var(--green); }
.week-tag.o { background: rgba(201,168,76,.12); color: var(--gold); }
.week-tag.r { background: rgba(217,79,79,.12); color: var(--red); }
.week-tag .tag-mult { font-weight: 500; }
.week-meta { display: flex; gap: 12px; font-family: var(--mono); font-size: 9px; color: var(--cream-dim); letter-spacing: .04em; flex-shrink: 0; }
.week-expand-icon { font-family: var(--mono); font-size: 14px; color: var(--cream-dim); transition: transform .2s; margin-left: 8px; }
.week-card.expanded .week-expand-icon { transform: rotate(90deg); }
.week-detail { display: none; padding: 0 18px 18px; background: var(--navy-mid); border-top: 1px solid var(--rule); }
.week-card.expanded .week-detail { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 14px; }
.detail-section-title { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--rule); }
.detail-item { font-family: var(--sans); font-size: 12px; color: var(--cream); padding: 3px 0; display: flex; align-items: baseline; gap: 6px; }
.detail-item .d-label { color: var(--cream-dim); font-family: var(--mono); font-size: 10px; }
.detail-item .d-mult { font-family: var(--mono); font-size: 10px; color: var(--green); font-weight: 500; }
.detail-item .d-pct { font-family: var(--mono); font-size: 10px; color: var(--gold); font-weight: 500; }
.sl { cursor: pointer; transition: color .1s; }
.sl:hover { color: var(--gold); }
.overlay-badge { display: inline-block; font-family: var(--mono); font-size: 8px; letter-spacing: .06em; text-transform: uppercase; padding: 2px 6px; background: rgba(224,140,42,.15); color: var(--amber); margin-bottom: 8px; margin-right: 4px; }
</style>
</head>
<body>

<header class="site-header">
  <a href="/" class="wordmark">
    <span class="line1">McKillsey</span>
    <span class="line2">&amp; Company</span>
  </a>
  <div class="header-tagline">Strategic Advisory · Los Santos · Blaine County</div>
</header>

<main class="page">
  <div class="page-title">
    <h1>Weekly Archive</h1>
    <div class="subtitle">Historical Bonus &amp; Discount Intelligence — 16 Weeks of Market Data</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">&#x2315;</span>
    <input type="text" class="search-input" id="search" placeholder="Search anything: Cocaine, Toreador, 2x Bunker, Diamonds, Krieger..." autocomplete="off" spellcheck="false">
    <div class="search-hint">Try: <span>Counterfeit Cash</span> &middot; <span>Kosatka</span> &middot; <span>Panther</span> &middot; <span>Casino Heist</span> &middot; <span>GTA+</span> &middot; <span>Krieger</span></div>
  </div>

  <div class="filter-row" id="filters">
    <button class="filter-pill active" data-filter="all">All</button>
    <button class="filter-pill" data-filter="bonus">Bonuses</button>
    <button class="filter-pill" data-filter="discount">Discounts</button>
    <button class="filter-pill" data-filter="vehicle">Vehicles</button>
    <button class="filter-pill" data-filter="gun">Gun Van</button>
    <button class="filter-pill" data-filter="event">Events</button>
    <button class="filter-pill" data-filter="fib">FIB Files</button>
  </div>

  <div class="results-wrap" id="results-wrap">
    <div class="stats-panel" id="stats-panel" style="display:none"></div>
    <div class="results-header">
      <span>Search Results</span>
      <span class="results-count" id="results-count"></span>
    </div>
    <div id="results-list"></div>
  </div>

  <div class="section" id="timeline-section">
    <div class="section-label">Weekly Timeline — Reverse Chronological</div>
    <div class="timeline" id="timeline"></div>
  </div>
</main>

<script>
/* McKillsey Archive — App Logic */

// Global state
var activeFilter = 'all';
var searchTimeout = null;

// 1. DATA DEFINITIONS (Abbreviated for brevity, normally the full data blocks go here)
var IDX = [{"t":"Karin Sultan RS Classic","y":"podium","w":"2026-02-19","d":"Podium Vehicle","s":"2026-02-19","e":"2026-02-26"},{"t":"Grotti Stinger GT","y":"prize","w":"2026-02-19","d":"Place Top 4 in LS Car Meet Series","s":"2026-02-19","e":"2026-02-26"},{"t":"Counterfeit Cash Sell Missions","y":"bonus","w":"2026-02-19","d":"2X GTA$","s":"2026-02-19","e":"2026-02-26"} /* ... and the rest of your 800+ entries ... */];
var TL = [{"id":"2026-02-19","name":"Biker Bonuses Week","start":"2026-02-19","end":"2026-02-26","days":7,"tags":[{"t":"Counterfeit Cash Sell Missions","c":"g","m":"2X"}],"vc":12,"pc":2,"ov":["Lunar New Year"]} /* ... and the rest of your 16 weeks ... */];
var WD = {"2026-02-19":{"name":"Biker Bonuses Week","start":"2026-02-19","end":"2026-02-26","days":7,"podium":"Karin Sultan RS Classic","prize":"Grotti Stinger GT","test":["Benefactor Streiter"],"ptest":"Weeny Issi Rally","salvage":[{"r":"The Gangbanger Robbery","v":"Dewbauchee Champion"}],"lux":["Dinka LSCM Jester RR"],"pdm":["Enus Super Diamond \u2731"],"bonuses":[{"a":"Counterfeit Cash Sell Missions","m":"2X GTA$","g":""}],"disc_v":[{"i":"Cargobob","p":30}],"disc_p":[{"i":"Counterfeit Cash Factories","p":40}],"fib":"The Black Box File","ch":"Win 2 Stunt Races","chc":100000,"ov":["Lunar New Year"],"tt":"Maze Bank Arena","hsw_tt":"Ron Alternates to Elysian Island"} /* ... and the rest of your week data ... */};

var TYPE_LABELS = { podium:'Podium',prize:'Prize Ride',test:'Test Ride',ptest:'Premium Test Ride', salvage:'Salvage Yard',lux:'Luxury Autos',pdm:'Premium Deluxe', bonus:'Bonus',discount:'Discount',gun:'Gun Van',fib:'FIB File', gta_plus:'GTA+',challenge:'Challenge',tt:'Time Trial',hsw:'HSW Time Trial',event:'Event' };
var TYPE_BADGE = { bonus:'badge-bonus',discount:'badge-discount',gta_plus:'badge-bonus', podium:'badge-vehicle',prize:'badge-vehicle',test:'badge-vehicle',ptest:'badge-vehicle', salvage:'badge-vehicle',lux:'badge-vehicle',pdm:'badge-vehicle', gun:'badge-gun',event:'badge-event',fib:'badge-fib', challenge:'badge-fib',tt:'badge-fib',hsw:'badge-fib' };
var FILTER_MAP = { all: null, bonus: ['bonus','gta_plus'], discount: ['discount'], vehicle: ['podium','prize','test','ptest','salvage','lux','pdm'], gun: ['gun'], event: ['event','challenge'], fib: ['fib'] };

// 2. HELPERS & APP LOGIC
function escHtml(s) { if (!s) return ''; var d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
function escAttr(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function fmtDate(d) { var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; var parts = d.split('-'); return months[parseInt(parts[1])-1] + ' ' + parseInt(parts[2]); }
function fmtRange(s, e) { return fmtDate(s) + ' \u2013 ' + fmtDate(e); }
function daysSince(d) { return Math.round((new Date() - new Date(d)) / 86400000); }
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function highlightMatch(text, query) { var lower = text.toLowerCase(); var idx = lower.indexOf(query.toLowerCase()); if (idx === -1) return escHtml(text); return escHtml(text.substring(0, idx)) + '<mark>' + escHtml(text.substring(idx, idx + query.length)) + '<\/mark>' + escHtml(text.substring(idx + query.length)); }
function sl(text, term) { if (!text) return ''; var st = term || text; return '<span class="sl" onclick="event.stopPropagation();searchFor(\'' + escAttr(st) + '\')">' + escHtml(text) + '<\/span>'; }

function pushState(q) {
  try {
    if (window.history && window.history.pushState) {
      var url = q ? '?q=' + encodeURIComponent(q) : window.location.pathname;
      window.history.pushState({q: q}, '', url);
    }
  } catch(e) { console.warn("Navigation blocked in sandbox."); }
}

function searchFor(term) {
  var input = document.getElementById('search');
  if (!input) return;
  input.value = term;
  input.focus();
  document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
  document.querySelector('.filter-pill[data-filter="all"]').classList.add('active');
  activeFilter = 'all';
  pushState(term);
  doSearch(term);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function doSearch(query) {
  var wrap = document.getElementById('results-wrap');
  var list = document.getElementById('results-list');
  var countEl = document.getElementById('results-count');
  var statsPanel = document.getElementById('stats-panel');
  var tlSection = document.getElementById('timeline-section');
  if (!wrap || !list || !countEl || !statsPanel || !tlSection) return;

  if (!query || query.length < 2) { wrap.style.display = 'none'; statsPanel.style.display = 'none'; tlSection.style.display = ''; return; }

  var q = query.toLowerCase();
  var results = IDX.filter(function(r) { return r.t.toLowerCase().indexOf(q) !== -1 || r.d.toLowerCase().indexOf(q) !== -1; });
  if (activeFilter !== 'all') {
    var types = FILTER_MAP[activeFilter];
    if (types) results = results.filter(function(r) { return types.indexOf(r.y) !== -1; });
  }
  results.sort(function(a, b) { return b.s.localeCompare(a.s); });

  wrap.style.display = '';
  tlSection.style.display = 'none';

  if (results.length === 0) {
    list.innerHTML = '<div class="no-results">No results for "' + escHtml(query) + '"<\/div>';
    countEl.textContent = '0 results';
    statsPanel.style.display = 'none';
    return;
  }
  countEl.textContent = results.length + ' result' + (results.length !== 1 ? 's' : '');

  var html = '';
  results.slice(0, 60).forEach(function(r) {
    var badge = TYPE_BADGE[r.y] || 'badge-fib';
    var label = TYPE_LABELS[r.y] || r.y;
    html += '<div class="result-item"><div class="result-date">' + fmtDate(r.s) + '<\/div><div class="result-body"><div class="result-term">' + highlightMatch(r.t, query) + '<span class="result-badge ' + badge + '">' + label + '<\/span><\/div><div class="result-detail">' + escHtml(r.d) + '<\/div><\/div><\/div>';
  });
  list.innerHTML = html;
}

function renderTimeline() {
  var container = document.getElementById('timeline');
  if (!container) return;
  var html = '';
  TL.forEach(function(w) {
    var tags = '';
    w.tags.forEach(function(t) { tags += '<span class="week-tag ' + t.c + '"><span class="tag-mult">' + t.m + '<\/span> ' + escHtml(t.t) + '<\/span>'; });
    html += '<div class="week-card" data-week="' + w.id + '" onclick="toggleWeek(this)"><div class="week-header"><div class="week-date">' + fmtRange(w.start, w.end) + '<span class="week-dur">' + w.days + 'd<\/span><\/div><div class="week-name">' + escHtml(w.name) + '<\/div><div class="week-tags">' + tags + '<\/div><span class="week-expand-icon">\u203a<\/span><\/div><div class="week-detail" id="detail-' + w.id + '"><\/div><\/div>';
  });
  container.innerHTML = html;
}

function toggleWeek(card) {
  var wasExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.week-card.expanded').forEach(function(c) { c.classList.remove('expanded'); });
  if (wasExpanded) return;
  card.classList.add('expanded');
  var wid = card.dataset.week;
  var detail = document.getElementById('detail-' + wid);
  if (!detail || detail.dataset.loaded) return;
  detail.dataset.loaded = '1';
  var w = WD[wid];
  if (!w) return;
  detail.innerHTML = '<div class="detail-grid"><div class="detail-section"><div class="detail-section-title">Bonuses<\/div><div class="detail-item">' + sl(w.bonuses[0].a) + '<\/div><\/div><\/div>';
}

// 3. EVENT BINDING & INIT
document.addEventListener('DOMContentLoaded', function() {
  var searchInput = document.getElementById('search');
  var filters = document.getElementById('filters');
  var searchHint = document.querySelector('.search-hint');

  if (searchInput) {
    searchInput.addEventListener('input', function(e) {
      clearTimeout(searchTimeout);
      var val = e.target.value.trim();
      searchTimeout = setTimeout(function() { pushState(val); doSearch(val); }, 200);
    });
  }

  if (filters) {
    filters.addEventListener('click', function(e) {
      var pill = e.target.closest('.filter-pill');
      if (!pill) return;
      document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      activeFilter = pill.dataset.filter;
      var q = searchInput.value.trim();
      if (q.length >= 2) doSearch(q);
    });
  }

  if (searchHint) {
    searchHint.addEventListener('click', function(e) {
      if (e.target.tagName === 'SPAN') { searchFor(e.target.textContent); }
    });
  }

  renderTimeline();
  var params = new URLSearchParams(window.location.search);
  var q = params.get('q');
  if (q) { searchInput.value = q; doSearch(q); }
});
</script>
</body>
</html>
