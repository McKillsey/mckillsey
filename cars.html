function App(){
  // Parse URL: ?slug or ?slug&edit=key
  const urlParams=useMemo(()=>{const p=new URLSearchParams(location.search);const entries=[...p.entries()];
    // Support ?jack (key with no value) or ?slug=jack
    let slug=p.get('slug');if(!slug&&entries.length>0&&!entries[0][1])slug=entries[0][0];
    const edit=p.get('edit');return{slug:slug?.toLowerCase().trim()||null,edit:edit||null}},[]);

  const[coll,setColl]=useState(load);
  const[sq,setSq]=useState('');
  const[picker,setPicker]=useState(null);
  const[browse,setBrowse]=useState(false);
  const[io,setIo]=useState(null);
  const[propMgr,setPropMgr]=useState(false);
  const[help,setHelp]=useState(false);
  const[share,setShare]=useState(false);

  // Cloud state
  const[cloud,setCloud]=useState({slug:null,editKey:null,loading:false,dirty:false,lastSaved:null});

  // Load from cloud if URL has a slug, OR load r00t for first-time visitors
  useEffect(()=>{
    const slugToLoad=urlParams.slug;
    const isNewVisitor=!urlParams.slug&&!hasLocalData();

    if(!slugToLoad&&!isNewVisitor)return;

    const targetSlug=slugToLoad||DEFAULT_SLUG;
    if(slugToLoad)setCloud(c=>({...c,loading:true}));

    fetch(`/api/fleet?slug=${encodeURIComponent(targetSlug)}`)
      .then(r=>r.json())
      .then(d=>{
        if(d.ok&&d.data){
          setColl(migrateCollection(d.data));
          if(slugToLoad){
            // Explicit URL load — connect to cloud
            setCloud({slug:targetSlug,editKey:urlParams.edit,loading:false,dirty:false,lastSaved:d.updatedAt});
          }else{
            // New visitor — just seed their local copy, don't connect to cloud
            save(migrateCollection(d.data));
          }
        }else{
          if(slugToLoad){setCloud(c=>({...c,loading:false}));flash('Fleet "'+targetSlug+'" not found')}
          // For new visitors, silently fall back to hardcoded DEFAULT_COLL (already loaded)
        }
      })
      .catch(()=>{
        if(slugToLoad){setCloud(c=>({...c,loading:false}));flash('Failed to load fleet')}
      });
  },[]);

  // Mark dirty when collection changes (only if cloud-connected)
  const collRef=useRef(coll);
  useEffect(()=>{if(cloud.slug&&collRef.current!==coll)setCloud(c=>({...c,dirty:true}));collRef.current=coll},[coll,cloud.slug]);

  // Cloud save function
  const cloudSave=useCallback(async()=>{
    if(!cloud.slug||!cloud.editKey)return;
    setCloud(c=>({...c,loading:true}));
    try{
      const r=await fetch(`/api/fleet?slug=${encodeURIComponent(cloud.slug)}`,{
        method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({editKey:cloud.editKey,data:coll})});
      const d=await r.json();
      if(d.ok){setCloud(c=>({...c,loading:false,dirty:false,lastSaved:d.updatedAt}));flash('Saved to cloud')}
      else{setCloud(c=>({...c,loading:false}));flash(d.error||'Save failed')}
    }catch(e){setCloud(c=>({...c,loading:false}));flash('Save failed — check connection')}
  },[cloud.slug,cloud.editKey,coll]);
  const[toast,setToast]=useState('');
  const SETTINGS_KEY='mckillsey-view-settings';
  function loadSettings(){try{const s=JSON.parse(localStorage.getItem(SETTINGS_KEY));if(s)return s}catch(e){}return null}
  function saveSettings(s){try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(s))}catch(e){}}
  const savedSettings=useMemo(()=>loadSettings(),[]);
  const[hideEmpty,setHideEmpty]=useState(savedSettings?.hideEmpty??false);
  const[showDupes,setShowDupes]=useState(savedSettings?.showDupes??false);
  const[display,setDisplay]=useState(savedSettings?.display??{showMfr:true,showGta:true,showIrl:true,showBadges:true,gallery:false});
  const[slotScale,setSlotScale]=useState(savedSettings?.slotScale??0);
  useEffect(()=>{saveSettings({hideEmpty,showDupes,display,slotScale})},[hideEmpty,showDupes,display,slotScale]);

  useEffect(()=>{if(!urlParams.slug||urlParams.edit)save(coll)},[coll]);
  function flash(m){setToast(m);if(toastTimeout)clearTimeout(toastTimeout);toastTimeout=setTimeout(()=>setToast(''),1800)}
  function updateG(idx,g){const p=[...coll.properties];p[idx]=g;setColl({...coll,properties:p});flash('Saved')}
  const handleTag=useCallback((gi,si,tag)=>{const np=coll.properties.map(g=>({...g,slots:[...g.slots]}));const slot=np[gi].slots[si];if(!slot)return;np[gi].slots[si]={...slot,tag:tag||undefined};if(!tag)delete np[gi].slots[si].tag;setColl({...coll,properties:np})},[coll]);
  const handleDragDrop=useCallback((fGi,fSi,tGi,tSi)=>{try{if(fGi===tGi&&fSi===tSi)return;const np=coll.properties.map(g=>({...g,slots:[...g.slots]}));const fc=np[fGi].slots[fSi];const tc=np[tGi].slots[tSi];np[fGi].slots[fSi]=tc;np[tGi].slots[tSi]=fc;setColl({...coll,properties:np});if(fGi!==tGi)flash('Moved');else flash('Swapped')}catch(err){console.error('DragDrop error:',err);flash('Error: '+err.message)}},[coll]);
  const dupes=useMemo(()=>findDuplicates(coll.properties),[coll]);

  const ownedMap=useMemo(()=>{const m=new Map();coll.properties.forEach(g=>{g.slots.forEach(sl=>{if(sl){const d=resolveSlot(sl);if(d)m.set(d.vehicleId,sl.tag||'owned')}})});return m},[coll]);

  const stats=useMemo(()=>{
    let cars=0,slots=0,garages=0,totalValue=0;const cc={},mfrs={},irlMfrs={};const topCars=[];
    const seenByClass={},seenByMfr={},seenByIrlMfr={};
    coll.properties.forEach(g=>{
      const f=g.slots.filter(s=>s!==null).length;cars+=f;slots+=g.capacity;if(f>0)garages++;
      g.slots.forEach(s=>{if(!s)return;const dbv=resolveSlot(s);if(dbv){
        const vid=dbv.vehicleId;
        // Classes: count unique
        if(!seenByClass[dbv.cls])seenByClass[dbv.cls]=new Set();
        if(!seenByClass[dbv.cls].has(vid)){seenByClass[dbv.cls].add(vid);cc[dbv.cls]=(cc[dbv.cls]||0)+1}
        // GTA mfr: count unique
        if(dbv.mfr){if(!seenByMfr[dbv.mfr])seenByMfr[dbv.mfr]=new Set();if(!seenByMfr[dbv.mfr].has(vid)){seenByMfr[dbv.mfr].add(vid);mfrs[dbv.mfr]=(mfrs[dbv.mfr]||0)+1}}
        // IRL mfr: count unique
        const im=irlMfr(dbv.irl);if(im){if(!seenByIrlMfr[im])seenByIrlMfr[im]=new Set();if(!seenByIrlMfr[im].has(vid)){seenByIrlMfr[im].add(vid);irlMfrs[im]=(irlMfrs[im]||0)+1}}
        if(dbv.price>0){totalValue+=dbv.price;topCars.push({name:dbv.name,price:dbv.price})}
      }});
    });
    // Count total unique vehicles per class, manufacturer, and IRL manufacturer in the database
    const classTotals={},mfrTotals={},irlMfrTotals={};
    VEHICLES.forEach(v=>{classTotals[v.cls]=(classTotals[v.cls]||0)+1;if(v.mfr)mfrTotals[v.mfr]=(mfrTotals[v.mfr]||0)+1;const im=irlMfr(v.irl);if(im)irlMfrTotals[im]=(irlMfrTotals[im]||0)+1});
    const classRank=Object.entries(cc).sort((a,b)=>b[1]-a[1]);
    const mfrRank=Object.entries(mfrs).sort((a,b)=>b[1]-a[1]);
    const irlMfrRank=Object.entries(irlMfrs).sort((a,b)=>b[1]-a[1]);
    topCars.sort((a,b)=>b.price-a.price);
    return{cars,slots,garages,pct:slots?Math.round(cars/slots*100):0,classRank,mfrRank,irlMfrRank,classTotals,mfrTotals,irlMfrTotals,totalValue,topCars:topCars.slice(0,10),mfrCount:Object.keys(mfrs).length,irlMfrCount:Object.keys(irlMfrs).length};
  },[coll]);

  const displayGroups=useMemo(()=>{
    const groups=buildDisplayGroups(coll.properties);
    if(!hideEmpty)return groups;
    return groups.filter(g=>g.type==='single'?g.prop.slots.some(s=>s!==null):g.siblings.some(s=>s.prop.slots.some(x=>x!==null)));
  },[coll,hideEmpty]);

  return(<>
    <header className="site-header">
      <a href="/" className="wordmark"><span className="line1">McKillsey</span><span className="line2">&amp; Company</span></a>
      <span className="header-tagline">Fleet Management · Los Santos · Blaine County</span>
    </header>
    {cloud.slug&&<div className="cloud-banner">
      <span style={{color:'var(--cream)'}}>📂 {cloud.slug}'s fleet</span>
      {cloud.editKey?<span style={{color:'var(--green)'}}>· editing</span>:<span style={{color:'var(--cream-dim)'}}>· view only</span>}
      {cloud.dirty&&cloud.editKey&&<span style={{color:'var(--amber)'}}>· unsaved changes</span>}
      <button className="tb-btn" style={{padding:'2px 8px',fontSize:'8px',marginLeft:'auto'}} onClick={()=>{if(cloud.dirty&&!confirm('You have unsaved changes. Disconnect anyway?'))return;const url=new URL(location.href);url.search='';history.replaceState(null,'',url);location.reload()}}>✕ Disconnect</button>
    </div>}
    <div className="toolbar">
      <div className="toolbar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Search garages... try: imani, hsw, to buy, speed > 130" value={sq} onChange={e=>setSq(e.target.value)}/>
        <button className="tb-btn search-db-btn" onClick={()=>setBrowse(true)} title="Search full database">All Cars</button>
      </div>
      <div className="tb-seg"><span className="tb-seg-label">Empty</span><div className="tb-seg-group"><span className={`tb-seg-opt${!hideEmpty?' active':''}`} onClick={()=>setHideEmpty(false)}>Show</span><span className={`tb-seg-opt${hideEmpty?' active':''}`} onClick={()=>setHideEmpty(true)}>Hide</span></div></div>
      <div className="tb-seg"><span className="tb-seg-label">View</span><div className="tb-seg-group"><span className={`tb-seg-opt${!display.gallery?' active':''}`} onClick={()=>setDisplay(d=>({...d,gallery:false}))}>Details</span><span className={`tb-seg-opt${display.gallery?' active':''}`} onClick={()=>setDisplay(d=>({...d,gallery:true}))}>Gallery</span></div></div>
      <button className="tb-btn" onClick={()=>setPropMgr(true)}>Properties</button>
      <SettingsDropdown display={display} setDisplay={setDisplay} showDupes={showDupes} setShowDupes={setShowDupes} slotScale={slotScale} setSlotScale={setSlotScale}/>
      <button className="tb-btn" onClick={()=>setIo('export')}>Export</button>
      <button className="tb-btn" onClick={()=>setIo('import')}>Import</button>
      <button className="tb-btn green" onClick={()=>setShare(true)}>Share</button>
      {cloud.slug&&cloud.editKey&&<button className={`tb-btn ${cloud.dirty?'green':''}${cloud.loading?' loading':''}`} onClick={cloudSave} disabled={cloud.loading||!cloud.dirty}>{cloud.loading?'Saving...':cloud.dirty?'● Save':'✓ Saved'}</button>}
      <button className="tb-btn danger" onClick={()=>{if(confirm('Clear all vehicles from every garage? Properties will be kept.')){setColl(c=>({...c,properties:c.properties.map(p=>({...p,slots:Array(p.capacity).fill(null),theme:p.theme}))}));flash('Cleared all vehicles')}}}>Clear</button>
      <button className="tb-btn danger" onClick={()=>{if(confirm('Reset to demo fleet? This replaces everything.')){
        fetch(`/api/fleet?slug=${DEFAULT_SLUG}`).then(r=>r.json()).then(d=>{
          if(d.ok&&d.data){setColl(migrateCollection(d.data));flash('Reset to latest demo fleet')}
          else{setColl(JSON.parse(JSON.stringify(DEFAULT_COLL)));flash('Reset (offline fallback)')}
        }).catch(()=>{setColl(JSON.parse(JSON.stringify(DEFAULT_COLL)));flash('Reset (offline fallback)')})
      }}}>Reset</button>
      <button className="tb-btn" onClick={()=>setHelp(true)}>?</button>
    </div>
    <div className="app-body">
      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-value gold">{stats.cars}<span style={{fontSize:'11px',color:'var(--cream-dim)',fontWeight:400}}>/{stats.slots}</span></div>
          <div className="stat-label">Vehicles · {stats.pct}% Full</div>
        </div>
        <div className="stat-card hoverable">
          <div className="stat-value" style={{fontFamily:'var(--mono)'}}>{stats.classRank[0]?cls(stats.classRank[0][0]):'—'}</div>
          <div className="stat-label">Top Class ({stats.classRank[0]?stats.classRank[0][1]:0}) · hover for all</div>
          <div className="stat-pop">
            <div className="stat-pop-head">Classes by Count</div>
            {stats.classRank.map(([c,n])=><div key={c} className="stat-pop-row"><span className="pop-name">{cls(c)}</span><span className="pop-val">{n}<span className="pop-sub">/{stats.classTotals[c]||'?'}</span></span></div>)}
          </div>
        </div>
        {display.showMfr&&<div className="stat-card hoverable">
          <div className="stat-value">{stats.mfrCount}</div>
          <div className="stat-label">GTA Mfrs · hover for list</div>
          <div className="stat-pop">
            <div className="stat-pop-head">GTA Manufacturers by Count</div>
            {stats.mfrRank.map(([m,n])=><div key={m} className="stat-pop-row"><span className="pop-name">{m}</span><span className="pop-val">{n}<span className="pop-sub">/{stats.mfrTotals[m]||'?'}</span></span></div>)}
          </div>
        </div>}
        {display.showIrl&&<div className="stat-card hoverable">
          <div className="stat-value">{stats.irlMfrCount}</div>
          <div className="stat-label">IRL Mfrs · hover for list</div>
          <div className="stat-pop">
            <div className="stat-pop-head">IRL Manufacturers by Count</div>
            {stats.irlMfrRank.map(([m,n])=><div key={m} className="stat-pop-row"><span className="pop-name">{m}</span><span className="pop-val">{n}<span className="pop-sub">/{stats.irlMfrTotals[m]||'?'}</span></span></div>)}
          </div>
        </div>}
        <div className="stat-card"><div className="stat-value">{stats.garages}</div><div className="stat-label">Active Garages</div></div>
        <div className="stat-card hoverable">
          <div className="stat-value green">{stats.totalValue>=1e9?'$'+(stats.totalValue/1e9).toFixed(2)+'B':stats.totalValue>=1e6?'$'+(stats.totalValue/1e6).toFixed(1)+'M':fmt$(stats.totalValue)}</div>
          <div className="stat-label">Fleet MSRP · hover for top 10</div>
          <div className="stat-pop">
            <div className="stat-pop-head">Most Expensive</div>
            {stats.topCars.map((c,i)=><div key={i} className="stat-pop-row"><span className="pop-name">{c.name}</span><span className="pop-val">{fmt$(c.price)}</span></div>)}
          </div>
        </div>
      </div>
      <div className={`garage-list${display.gallery?' gallery-mode':''}`} style={{'--sb':slotScale*2+'px'}} data-scale={slotScale} onDragOver={e=>e.preventDefault()}>
        {displayGroups.map((g,i)=>{
          if(g.type==='single')return <GarageCard key={g.prop.id+'-'+g.propIdx} garages={[{prop:g.prop,propIdx:g.propIdx,floor:null}]} label={g.prop.name} sq={sq} dupes={dupes} showDupes={showDupes} display={display} hideEmpty={hideEmpty} onTag={handleTag} onUpdate={(idx,u)=>updateG(idx,u)} onAdd={(gi,si,lbl)=>setPicker({gi,si,label:lbl})} onDragDrop={handleDragDrop}/>;
          return <GarageCard key={g.label+'-'+i} garages={g.siblings.map(s=>({prop:s.prop,propIdx:s.propIdx,floor:s.floor}))} label={g.label} sq={sq} dupes={dupes} showDupes={showDupes} display={display} hideEmpty={hideEmpty} onTag={handleTag} onUpdate={(idx,u)=>updateG(idx,u)} onAdd={(gi,si,lbl)=>setPicker({gi,si,label:lbl})} onDragDrop={handleDragDrop}/>;
        })}
      </div>
    </div>
    <VehiclePicker isOpen={!!picker} onClose={()=>setPicker(null)} label={picker?.label} ownedMap={ownedMap} onSelect={v=>{if(!picker)return;const g=coll.properties[picker.gi];const s=[...g.slots];s[picker.si]={vehicleId:v.vehicleId};updateG(picker.gi,{...g,slots:s});flash('Added '+v.name)}}/>
    <VehiclePicker isOpen={browse} onClose={()=>setBrowse(false)} browseMode={true} ownedMap={ownedMap} onSelect={()=>{}}/>
    <PropertyManager isOpen={propMgr} onClose={()=>setPropMgr(false)} collection={coll} onUpdate={c=>{setColl(c);flash('Properties updated')}}/>
    <IOModal isOpen={!!io} mode={io} onClose={()=>setIo(null)} collection={coll} onImport={d=>{setColl(d);flash('Imported')}}/>
    <ShareModal isOpen={share} onClose={()=>setShare(false)} collection={coll} cloud={cloud} setCloud={setCloud} flash={flash}/>
    <Toast message={toast}/>
    {help&&<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setHelp(false)}}><div className="modal" style={{maxWidth:560}}>
      <div className="modal-head"><div className="modal-title">How to Use</div><div className="modal-sub">McKillsey Fleet Manager</div></div>
      <button className="modal-close" onClick={()=>setHelp(false)}>×</button>
      <div className="help-body">
        <div className="help-section">
          <div className="help-heading">Getting Started</div>
          <p>Click <b>Properties</b> to add your GTA garages. Search by name or location. Multi-floor properties (Office, Nightclub, Arena, Vinewood Club, Eclipse Blvd) are added and removed as a unit — all floors together. Click the ▸ chevron on any floor header to collapse or expand individual floors.</p>
        </div>
        <div className="help-section">
          <div className="help-heading">Adding Vehicles</div>
          <p>Click any empty slot (<span className="help-code">+ add</span>) to open the vehicle picker. Search by GTA name, manufacturer, IRL name, or DLC. You can also search by attribute — type <span className="help-code">imani</span>, <span className="help-code">hsw</span>, <span className="help-code">armored</span>, <span className="help-code">bp</span>, or <span className="help-code">weaponized</span>.</p>
          <p>Filter by performance: <span className="help-code">speed &gt; 130</span>, <span className="help-code">lap &lt; 1:02</span>, or <span className="help-code">price &gt; 2m</span>.</p>
          <p>Vehicles you already own are marked with ★ Owned and sorted to the bottom.</p>
        </div>
        <div className="help-section">
          <div className="help-heading">Managing Vehicles</div>
          <p>Hover a vehicle to see full details (class, price, lap time, top speed, badges). Drag vehicles between slots or garages to rearrange. Hover and click <span className="help-code">×</span> to remove or <span className="help-code">⚑</span> to tag as <span style={{color:'var(--green)'}}>To Buy</span> or <span style={{color:'var(--red)'}}>To Sell</span>.</p>
        </div>
        <div className="help-section">
          <div className="help-heading">Search Bar</div>
          <p>The toolbar search filters your garages. It supports the same attribute and performance queries as the picker, plus tag filters: <span className="help-code">to buy</span>, <span className="help-code">to sell</span>, <span className="help-code">tagged</span>. Click <span className="help-code">All Cars</span> to browse the full database.</p>
        </div>
        <div className="help-section">
          <div className="help-heading">View Options</div>
          <p><span className="help-code">Empty: Show/Hide</span> toggles visibility of empty garages and empty floors within multi-floor properties. <span className="help-code">View: Details/Gallery</span> switches between the slot list and a photo grid. Click <span className="help-code">⚙ View</span> for more: slot size, visible fields (manufacturer, GTA name, IRL name, badges), and duplicate warnings.</p>
        </div>
        <div className="help-section">
          <div className="help-heading">Saving &amp; Sharing</div>
          <p>Your fleet saves to your browser automatically. Click <span className="help-code">Share</span> to save it online and get a shareable link. Pick a name (this becomes your URL), and optionally set a passphrase. No account needed.</p>
          <p>You'll get two links: a <b>view link</b> anyone can open, and an <b>edit link</b> (with your secret key) that lets you save changes. Bookmark the edit link — it's the only way to save back to the cloud.</p>
          <p>Click <span className="help-code">✕ Disconnect</span> in the banner to go back to your local fleet.</p>
        </div>
        <div className="help-section">
          <div className="help-heading">Backup &amp; Reset</div>
          <p><span className="help-code">Export</span> downloads a JSON backup. <span className="help-code">Import</span> restores from a file or pasted JSON. <span className="help-code">Clear</span> empties all vehicles but keeps your properties. <span className="help-code">Reset</span> replaces everything with the latest demo fleet.</p>
        </div>
        <div className="help-section">
          <div className="help-heading">Stats</div>
          <p>The stat bar shows your fleet summary. Hover any card for a detailed breakdown. Class and manufacturer counts show unique vehicles — duplicates count toward your total but not per-brand or per-class.</p>
        </div>
      </div>
      <div className="modal-footer"><button className="tb-btn primary" onClick={()=>setHelp(false)}>Got it</button></div>
    </div></div>}
    <div style={{padding:'16px 32px 24px',borderTop:'1px solid var(--rule)',marginTop:32,fontFamily:'var(--mono)',fontSize:9,color:'var(--cream-dim)',letterSpacing:'.04em',lineHeight:1.8}}>
      <span style={{color:'var(--gold-dim)'}}><sup>1</sup></span> Lap times and top speeds sourced from <a href="https://gtacars.net" target="_blank" rel="noopener" style={{color:'var(--gold-dim)',textDecoration:'underline',textUnderlineOffset:2}}>Broughy1322 / gtacars.net</a>. Tested on PC with max upgrades on the standard test track. See <a href="https://www.youtube.com/@Broughy1322" target="_blank" rel="noopener" style={{color:'var(--gold-dim)',textDecoration:'underline',textUnderlineOffset:2}}>his YouTube channel</a> for methodology and full testing videos.
    </div>
  </>);
}
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null}}
  static getDerivedStateFromError(e){return{error:e}}
  componentDidCatch(e,info){console.error('React crash:',e,info)}
  render(){if(this.state.error)return React.createElement('div',{style:{padding:40,fontFamily:'var(--mono)',color:'var(--red)',fontSize:13}},
    React.createElement('h2',{style:{color:'var(--gold)',marginBottom:12}},'Something crashed'),
    React.createElement('pre',{style:{color:'var(--cream-dim)',whiteSpace:'pre-wrap'}},this.state.error.toString()),
    React.createElement('button',{onClick:()=>this.setState({error:null}),style:{marginTop:12,padding:'8px 16px',background:'var(--gold)',color:'var(--navy)',border:'none',cursor:'pointer',fontFamily:'var(--mono)'}},'Try again'));
    return this.props.children}
}

// Show loading state
ReactDOM.render(React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'var(--mono)',color:'var(--gold)',fontSize:14}},'Loading vehicle database...'),document.getElementById('root'));

// Fetch DB and transform to ultra format
(async()=>{
  try{
    const DB_URL='/cars/db.json';
    const res=await fetch(DB_URL);
    if(!res.ok)throw new Error('Failed to load '+DB_URL+' ('+res.status+')');
    const fullDb=await res.json();
    
    const STORABLE=new Set(['CAR','MOTORCYCLE','BIKE','QUADBIKE','AMPHIBIOUS_AUTOMOBILE','AMPHIBIOUS_QUADBIKE','SUBMARINECAR','BICYCLE']);
    const DLC_SHORT={'TitleUpdate':'Launch','mpbeach':'Beach Bum','mpbusiness':'Business','mpbusiness2':'Business 2','mpchristmas2':'Festive Surprise','mphipster':"I'm Not a Hipster",'mpindependence':'Independence Day','mppilot':'Flight School','mpvalentines':'Be My Valentine','mpvalentines2':'Be My Valentine','mpheist':'Heists','mpluxe':'Ill-Gotten Gains','mpluxe2':'Ill-Gotten Gains 2','mplowrider':'Lowriders','mplowrider2':'Lowriders: Custom Classics','mpexecutive':'Finance & Felony','mpstunt':'Cunning Stunts','mpbiker':'Bikers','mpimportexport':'Import/Export','mpgunrunning':'Gunrunning','mpsmuggler':"Smuggler's Run",'mpchristmas2017':'Doomsday Heist','mpchristmas2018':'Arena War','mpheist3':'Diamond Casino Heist','mpheist4':'Cayo Perico','mpvinewood':'Diamond Casino','mpsum':'LS Summer Special','mpsum2':'Criminal Enterprises','mptuner':'Los Santos Tuners','mpsecurity':'The Contract','mpfixer':'The Contract','mp2023_01':'LS Drug Wars','mp2023_02':'SA Mercenaries','mp2024_01':'Bottom Dollar Bounties','mp2024_02':'Agents of Sabotage','mp2024_03':'Money Fronts','mpg9ec':'Enhanced','mpsum2_g9ec':'Enhanced','mp2025_01':'Mansions','mp2025_02':'mp2025_02','mpbattle':'After Hours','mpassault':'Southern SA Super Sport','mpspecialraces':'Special Vehicle Circuit','mpjanuary2016':'January 2016','mplts':'Last Team Standing','spupgrade':'spupgrade','mphalloween':'Halloween','mpxmas_604490':'Festive 2015','mpapartment':'Executives & Other Criminals'};
    
    RAW_V=fullDb.filter(v=>STORABLE.has(v.type)).map(v=>{
      const gf=v.flags||[];
      let flags='';
      if(v.irlName)flags+='I';
      if(v.hsw)flags+='H';
      if(v.id&&v.id.endsWith('_hsw'))flags+='h';
      if(v.imaniTech==='full')flags+='F';
      else if(v.imaniTech==='jammer')flags+='J';
      if(gf.includes('BULLET_RESISTANT_GLASS')||gf.includes('CAPPED_EXPLOSION_DAMAGE')||gf.includes('FLAG_DISABLE_THROUGH_WINDSCREEN'))flags+='A';
      if(gf.includes('BULLET_RESISTANT_GLASS'))flags+='B';
      if(gf.includes('CAPPED_EXPLOSION_DAMAGE'))flags+='E';
      if(v.weapons&&v.weapons.length)flags+='W';
      if(v.convertible)flags+='C';
      const dlc=DLC_SHORT[v.dlc]||v.dlc||'';
      return[v.displayName,v.manufacturer||'',v.class||'',flags,v.irlName||'',v.price>100?v.price:0,v.seats||0,dlc,v.scImageId||v.id||'',v.lapTime||null,v.topSpeed||null,v.id||''];
    });
    
    // Re-init VEHICLES array
    VEHICLES.length=0;
    RAW_V.forEach((v,i)=>VEHICLES.push({
      idx:i,name:v[0],mfr:v[1],cls:v[2],flags:v[3]||'',
      irl:v[4]||null,price:v[5]||0,seats:v[6]||0,dlc:v[7]||'',
      imgId:v[8]||'',lapTime:v[9]||null,topSpeed:v[10]||null,
      vehicleId:v[11]||v[8]||'',
      hsw:(v[3]||'').includes('H'),
      isHswVariant:(v[3]||'').includes('h'),
      imani:(v[3]||'').includes('F')?'full':(v[3]||'').includes('J')?'jammer':null,
      armored:(v[3]||'').includes('A'),brGlass:(v[3]||'').includes('B'),expRes:(v[3]||'').includes('E'),
      wpnzed:(v[3]||'').includes('W'),convertible:(v[3]||'').includes('C'),
    }));
    // Rebuild lookup
    VEHICLES.forEach(v=>{VEH_BY_NAME[v.name.toLowerCase()]=v;VEH_BY_ID[v.vehicleId]=v;const c=v.name.replace(/\s*\(HSW\)\s*$/i,'').trim().toLowerCase();if(c!==v.name.toLowerCase())VEH_BY_NAME[c]=v});
    
    // Now render the real app
    ReactDOM.render(React.createElement(ErrorBoundary,null,React.createElement(App,null)),document.getElementById('root'));
  }catch(err){
    ReactDOM.render(React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'var(--mono)',color:'var(--red)',fontSize:13,gap:12}},
      React.createElement('div',null,'Failed to load vehicle database'),
      React.createElement('div',{style:{color:'var(--cream-dim)',fontSize:11}},err.message),
      React.createElement('div',{style:{color:'var(--cream-dim)',fontSize:10,marginTop:8}},'Make sure /cars/db.json is accessible')
    ),document.getElementById('root'));
  }
})()
</script>
</body>
</html>
