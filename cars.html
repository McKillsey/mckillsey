<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Management — McKillsey & Company</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b2a;--navy-mid:#162436;--navy-light:#1e3148;--cream:#f0ead8;--cream-dim:#9aabbf;--gold:#c9a84c;--gold-dim:#8a6f2e;--green:#2dba72;--red:#d94f4f;--amber:#e08c2a;--rule:rgba(201,168,76,.18);--serif:'Playfair Display',Georgia,serif;--mono:'IBM Plex Mono','Courier New',monospace;--sans:'IBM Plex Sans','Helvetica Neue',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}body{background:var(--navy);color:var(--cream);font-family:var(--sans);line-height:1.5;min-height:100vh}
::selection{background:var(--gold);color:var(--navy)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--navy)}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}
a{color:var(--gold);text-decoration:none}input,select,textarea,button{font-family:inherit}

.site-header{border-bottom:1px solid var(--rule);padding:16px 32px;display:flex;align-items:center;gap:24px}
.wordmark{font-family:var(--serif);font-weight:700;color:#b8c8d8;line-height:1.15;text-decoration:none}
.wordmark .line1{display:block;font-size:22px}.wordmark .line2{display:block;font-size:18px;padding-left:1.1em}
.header-tagline{font-family:var(--mono);font-size:9px;color:var(--cream-dim);letter-spacing:.1em;text-transform:uppercase;margin-left:auto}

.toolbar{display:flex;align-items:center;gap:10px;padding:12px 32px;border-bottom:1px solid var(--rule);background:rgba(22,36,54,.6);flex-wrap:wrap}
.toolbar-search{display:flex;align-items:center;gap:6px;background:var(--navy);border:1px solid var(--rule);padding:6px 12px;flex:1;min-width:200px;max-width:360px}
.toolbar-search svg{width:14px;height:14px;color:var(--cream-dim);flex-shrink:0}
.toolbar-search input{background:none;border:none;color:var(--cream);font-size:12px;width:100%;outline:none;font-family:var(--mono)}
.toolbar-search input::placeholder{color:var(--cream-dim);opacity:.6}
.tb-btn{background:var(--navy-mid);border:1px solid var(--rule);color:var(--cream-dim);padding:6px 12px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap}
.tb-btn:hover{background:var(--navy-light);color:var(--cream);border-color:var(--gold-dim)}
.tb-btn.active{background:rgba(201,168,76,.12);color:var(--gold);border-color:var(--gold)}
.tb-btn.primary{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:500}
.tb-btn.primary:hover{background:var(--cream)}
.tb-btn.danger{color:var(--red)}.tb-btn.danger:hover{border-color:var(--red)}
.tb-check{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--cream-dim);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;user-select:none}
.tb-check input{accent-color:var(--gold);cursor:pointer}

.app-body{padding:24px 32px 80px;max-width:1600px;margin:0 auto}

.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:24px}
.stat-card{background:var(--navy-mid);padding:14px 12px;position:relative}
.stat-card.hoverable{cursor:default}
.stat-value{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--cream);line-height:1;margin-bottom:3px}
.stat-value.gold{color:var(--gold)}.stat-value.green{color:var(--green)}
.stat-label{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-dim)}

/* Stat hover popover */
.stat-pop{position:absolute;top:100%;left:0;right:0;min-width:200px;z-index:50;background:#08111a;border:1px solid var(--gold);border-top:none;padding:8px 0;display:none;max-height:320px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.stat-card.hoverable:hover .stat-pop{display:block}
.stat-pop-row{display:flex;justify-content:space-between;padding:3px 12px;font-family:var(--mono);font-size:10px}
.stat-pop-row .pop-name{color:var(--cream)}
.stat-pop-row .pop-val{color:var(--gold);min-width:30px;text-align:right}
.stat-pop-row .pop-sub{color:var(--cream-dim);font-size:9px}
.stat-pop-head{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);padding:3px 12px 5px;border-bottom:1px solid rgba(201,168,76,.15);margin-bottom:2px}

.garage-list{display:flex;flex-direction:column;gap:12px;--sb:0px;user-select:none}
.garage-card{border:1px solid var(--rule);background:var(--navy-mid)}
.garage-header{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--rule);cursor:pointer;user-select:none}
.garage-header:hover{background:rgba(201,168,76,.03)}
.garage-chevron{color:var(--cream-dim);font-size:10px;transition:transform .2s;width:14px;text-align:center}
.garage-chevron.open{transform:rotate(90deg)}
.garage-name{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--cream)}
.garage-theme{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-dim);margin-left:6px}
.garage-value{font-family:var(--mono);font-size:9px;color:var(--cream-dim);margin-left:6px}
.garage-meta{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--cream-dim);display:flex;align-items:center;gap:10px}
.garage-fill-bar{width:50px;height:3px;background:var(--navy-light);border-radius:2px;overflow:hidden}
.garage-fill-inner{height:100%;border-radius:2px;background:var(--gold);transition:width .3s}
.garage-dupe{font-family:var(--mono);font-size:8px;color:var(--amber);margin-left:6px}

.floor-header{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dim);padding:6px 12px 4px;background:rgba(201,168,76,.02);border-bottom:1px solid rgba(201,168,76,.06)}

/* 10-column slot grid */
.slot-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:1px;padding:1px;background:rgba(201,168,76,.05);user-select:none}
.garage-list[data-scale="2"] .slot-grid{grid-template-columns:repeat(8,1fr)}
.garage-list[data-scale="3"] .slot-grid{grid-template-columns:repeat(6,1fr)}

/* Gallery view overrides */
.garage-list.gallery-mode .slot-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:3px;padding:3px}
.garage-list.gallery-mode .slot{padding:0;min-height:0;border-left:none;aspect-ratio:16/9;overflow:hidden;position:relative}
.garage-list.gallery-mode .slot .slot-num{z-index:3;top:4px;right:6px;font-size:9px;opacity:.5;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.garage-list.gallery-mode .slot .slot-actions{z-index:4;top:4px;right:22px}
.garage-list.gallery-mode .slot .slot-mfr,.garage-list.gallery-mode .slot .slot-irl,.garage-list.gallery-mode .slot .slot-badges{display:none}
.garage-list.gallery-mode .slot .slot-gta{position:absolute;bottom:0;left:0;right:0;padding:20px 8px 6px 8px;margin:0;font-size:12px;z-index:2;background:linear-gradient(transparent,rgba(0,0,0,.75));white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.garage-list.gallery-mode .slot .gallery-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1}
.garage-list.gallery-mode .slot .gallery-img-shimmer{position:absolute;inset:0;z-index:0;background:linear-gradient(135deg,var(--navy-mid) 25%,var(--navy-light) 50%,var(--navy-mid) 75%);background-size:200% 200%;animation:shimmer 1.8s ease-in-out infinite}
.garage-list.gallery-mode .slot.empty{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
.garage-list.gallery-mode .slot.empty .empty-label{font-size:10px}
.garage-list.gallery-mode .slot:hover{outline:1px solid var(--gold);outline-offset:-1px}
.slot{background:var(--navy);padding:calc(7px + var(--sb)*.4) calc(8px + var(--sb)*.3);min-height:calc(52px + var(--sb)*4);position:relative;cursor:default;transition:background .12s,border-color .12s;border-left:2px solid transparent}
.slot:hover{background:rgba(30,49,72,.8)}
.slot.empty{opacity:.35;cursor:pointer}.slot.empty:hover{opacity:.65;background:rgba(201,168,76,.04);border-left-color:var(--gold-dim)}
.slot.highlight{background:rgba(201,168,76,.08);border-left-color:var(--gold);opacity:1!important}
.slot.drag-over{border-left-color:var(--gold);background:rgba(201,168,76,.12)!important;opacity:1!important}
.slot[draggable=true]{cursor:grab}.slot[draggable=true]:active{cursor:grabbing}
.slot.dupe-flag{border-right:2px solid var(--amber)}

.slot-num{position:absolute;top:2px;right:4px;font-family:var(--mono);font-size:calc(7px + var(--sb)*.6);color:var(--cream-dim);opacity:.3}
.slot-mfr{font-family:var(--mono);font-size:calc(7px + var(--sb)*.6);letter-spacing:.03em;text-transform:uppercase;color:var(--gold-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-gta{font-family:var(--serif);font-size:calc(11px + var(--sb));font-weight:700;color:var(--cream);line-height:1.2;padding-right:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-irl{font-family:var(--sans);font-size:calc(9px + var(--sb)*.8);color:var(--cream-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-badges{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap}
.slot-badge{font-family:var(--mono);font-size:calc(6px + var(--sb)*.6);letter-spacing:.02em;text-transform:uppercase;padding:calc(1px + var(--sb)*.15) calc(3px + var(--sb)*.2);border-radius:1px}
.badge-hsw{background:rgba(224,140,42,.2);color:var(--amber)}
.badge-imani{background:rgba(45,186,114,.15);color:var(--green)}
.badge-armor{background:rgba(201,168,76,.15);color:var(--gold)}
.badge-weapon{background:rgba(217,79,79,.15);color:var(--red)}
.slot-actions{position:absolute;top:3px;right:3px;display:none;gap:2px}
.slot:hover .slot-actions{display:flex}
.slot-action-btn{background:var(--navy-mid);border:1px solid var(--rule);color:var(--cream-dim);width:calc(16px + var(--sb));height:calc(16px + var(--sb));display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:calc(9px + var(--sb)*.5);transition:all .1s;border-radius:1px}
.slot-action-btn:hover{background:var(--red);color:white;border-color:var(--red)}
.empty-label{font-family:var(--mono);font-size:calc(8px + var(--sb)*.6);color:var(--cream-dim);opacity:.5;letter-spacing:.02em}

/* Vehicle tooltip */
.vtip{position:fixed;z-index:9999;width:280px;background:#08111a;border:1px solid var(--gold);padding:0;pointer-events:none;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.vtip-img-wrap{position:relative;width:100%;height:158px;overflow:hidden;background:var(--navy-mid)}
.vtip-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.vtip-img-wrap.loading{background:linear-gradient(90deg,var(--navy-mid) 25%,var(--navy-light) 50%,var(--navy-mid) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.vtip-img-wrap img.loaded{animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.vtip-head{padding:10px 12px 8px;border-bottom:1px solid rgba(201,168,76,.15)}
.vtip-mfr{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.vtip-name{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--cream);line-height:1.2}
.vtip-irl{font-family:var(--sans);font-size:11px;color:var(--cream-dim);margin-top:2px}
.vtip-body{padding:8px 12px}
.vtip-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.vtip-label{font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--cream-dim)}
.vtip-val{font-family:var(--mono);font-size:11px;color:var(--cream);text-align:right}
.vtip-val.gold{color:var(--gold)}.vtip-val.green{color:var(--green)}
.vtip-badges{display:flex;gap:4px;flex-wrap:wrap;padding:6px 12px 10px;border-top:1px solid rgba(201,168,76,.1)}
.vtip-badge{font-family:var(--mono);font-size:8px;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:1px}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:50px}
.modal{background:var(--navy-mid);border:1px solid var(--rule);width:620px;max-width:calc(100vw - 32px);max-height:calc(100vh - 100px);display:flex;flex-direction:column;position:relative}
.modal-head{padding:18px 22px 0}
.modal-title{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--cream)}
.modal-sub{font-family:var(--mono);font-size:9px;color:var(--cream-dim);letter-spacing:.06em;margin-top:3px}
.modal-search{margin:10px 22px 0;display:flex;align-items:center;gap:8px;background:var(--navy);border:1px solid var(--rule);padding:7px 12px}
.modal-search input{background:none;border:none;color:var(--cream);font-size:12px;width:100%;outline:none;font-family:var(--mono)}
.modal-search input::placeholder{color:var(--cream-dim);opacity:.5}
.modal-filters{display:flex;gap:5px;padding:8px 22px;flex-wrap:wrap}
.filter-chip{font-family:var(--mono);font-size:9px;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border:1px solid var(--rule);color:var(--cream-dim);cursor:pointer;transition:all .12s;background:none}
.filter-chip:hover{border-color:var(--gold-dim);color:var(--cream)}
.filter-chip.active{background:rgba(201,168,76,.15);color:var(--gold);border-color:var(--gold)}
.modal-list{flex:1;overflow-y:auto;padding:0 22px 14px}
.modal-vehicle{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(201,168,76,.05);cursor:pointer;transition:background .1s}
.modal-vehicle:hover{background:rgba(201,168,76,.04);margin:0 -22px;padding:7px 22px}
.mv-name{font-family:var(--serif);font-size:12px;font-weight:700;color:var(--cream)}
.mv-irl{font-family:var(--sans);font-size:10px;color:var(--cream-dim)}
.mv-mfr{font-family:var(--mono);font-size:8px;color:var(--gold-dim);letter-spacing:.04em;text-transform:uppercase}
.mv-badges{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.mv-badges .slot-badge{font-size:8px;padding:2px 5px}
.mv-class{font-family:var(--mono);font-size:8px;color:var(--cream-dim);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.mv-price{font-family:var(--mono);font-size:9px;color:var(--cream-dim);white-space:nowrap;flex-shrink:0;min-width:60px;text-align:right}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--cream-dim);font-size:18px;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--cream)}
.modal-footer{padding:10px 22px;border-top:1px solid var(--rule);display:flex;justify-content:flex-end;gap:8px;align-items:center}
.io-textarea{width:100%;min-height:180px;background:var(--navy);border:1px solid var(--rule);color:var(--cream);font-family:var(--mono);font-size:10px;padding:10px;resize:vertical;outline:none;margin:10px 0}
.io-textarea:focus{border-color:var(--gold)}
.prop-list{max-height:400px;overflow-y:auto;padding:0 22px}
.prop-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(201,168,76,.06);transition:background .15s}
.prop-item.prop-dragging{opacity:.3}.prop-item.prop-drag-over{background:rgba(201,168,76,.08)}
.prop-item-grip{cursor:grab;color:var(--cream-dim);font-size:11px;padding:2px 4px;user-select:none;opacity:.5}
.prop-item-grip:hover{opacity:1;color:var(--gold)}.prop-item-grip:active{cursor:grabbing}
.prop-item-name{font-family:var(--sans);font-size:12px;color:var(--cream);flex:1}
.prop-item-cap{font-family:var(--mono);font-size:10px;color:var(--cream-dim)}
.prop-item-btn{background:none;border:1px solid var(--rule);color:var(--cream-dim);font-family:var(--mono);font-size:9px;padding:2px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
.prop-item-btn:hover{border-color:var(--gold);color:var(--gold)}
.prop-item-btn.remove:hover{border-color:var(--red);color:var(--red)}
.prop-add-section{padding:12px 22px;border-top:1px solid var(--rule)}
.prop-select{background:var(--navy);border:1px solid var(--rule);color:var(--cream);font-family:var(--mono);font-size:11px;padding:6px 8px;flex:1;outline:none}
.prop-select:focus{border-color:var(--gold)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy-light);border:1px solid var(--gold);padding:8px 18px;font-family:var(--mono);font-size:11px;color:var(--gold);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Editable theme inline */
.theme-edit-wrap{display:inline-flex;align-items:center;margin-left:6px}
.theme-display{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-dim);cursor:pointer;border-bottom:1px dashed transparent;padding-bottom:1px}
.theme-display:hover{border-bottom-color:var(--gold-dim)}
.theme-input{background:none;border:none;border-bottom:1px solid var(--gold);font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);width:140px;outline:none;padding:0 0 1px}
.theme-add{font-family:var(--mono);font-size:8px;color:var(--cream-dim);opacity:.3;cursor:pointer;margin-left:6px}
.theme-add:hover{opacity:.7;color:var(--gold)}

/* Settings dropdown */
.settings-wrap{position:relative}
.settings-panel{position:absolute;top:calc(100% + 4px);right:0;background:#08111a;border:1px solid var(--gold);padding:10px 14px;z-index:80;min-width:200px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.settings-wrap.open .settings-panel{display:block}
.settings-head{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(201,168,76,.2)}
.settings-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-family:var(--mono);font-size:10px;color:var(--cream-dim);cursor:pointer;user-select:none;letter-spacing:.03em}
.settings-item:hover{color:var(--cream)}
.settings-item input{accent-color:var(--gold);cursor:pointer}
.settings-slider-wrap{padding:4px 0 2px}
.settings-slider-row{display:flex;align-items:center;gap:8px}
.settings-slider{-webkit-appearance:none;appearance:none;flex:1;height:3px;background:var(--navy-light);outline:none;border-radius:2px;cursor:pointer}
.settings-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:var(--gold);cursor:pointer;border:none}
.settings-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--gold);cursor:pointer;border:none}
.settings-slider-val{font-family:var(--mono);font-size:10px;color:var(--gold);min-width:22px;text-align:right}
.settings-slider-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:7px;color:var(--cream-dim);opacity:.5;margin-top:1px;padding:0 1px;margin-right:30px}

/* Compact slot modes */
.slot.compact-1{min-height:calc(40px + var(--sb)*3);padding:calc(5px + var(--sb)*.3) calc(8px + var(--sb)*.3)}
.slot.compact-2{min-height:calc(32px + var(--sb)*2.5);padding:calc(4px + var(--sb)*.25) calc(8px + var(--sb)*.3)}
.slot.compact-3{min-height:calc(24px + var(--sb)*2);padding:calc(3px + var(--sb)*.2) calc(8px + var(--sb)*.3)}

/* Searchable property picker */
.prop-search-wrap{position:relative;flex:1}
.prop-search-input{width:100%;background:var(--navy);border:1px solid var(--rule);color:var(--cream);font-family:var(--mono);font-size:11px;padding:6px 8px;outline:none}
.prop-search-input:focus{border-color:var(--gold)}
.prop-search-input::placeholder{color:var(--cream-dim);opacity:.5}
.prop-dropdown{position:absolute;left:0;right:0;top:100%;background:#08111a;border:1px solid var(--gold);border-top:none;max-height:280px;overflow-y:auto;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.prop-dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;cursor:pointer;transition:background .1s;gap:8px}
.prop-dropdown-item:hover,.prop-dropdown-item.focused{background:rgba(201,168,76,.08)}
.prop-dropdown-name{font-family:var(--sans);font-size:11px;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.prop-dropdown-meta{font-family:var(--mono);font-size:9px;color:var(--cream-dim);white-space:nowrap;flex-shrink:0}
.prop-dropdown-loc{font-family:var(--mono);font-size:8px;color:var(--gold-dim);white-space:nowrap;flex-shrink:0}
.prop-dropdown-empty{padding:10px;font-family:var(--mono);font-size:10px;color:var(--cream-dim);text-align:center}

/* IO file buttons */
.io-btn-row{display:flex;gap:8px;padding:0 22px;margin-top:6px}
.io-file-label{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--cream-dim);background:var(--navy);border:1px solid var(--rule);padding:6px 12px;cursor:pointer;transition:all .15s}
.io-file-label:hover{border-color:var(--gold);color:var(--gold)}
.io-sep{font-family:var(--mono);font-size:9px;color:var(--cream-dim);padding:8px 22px 0;letter-spacing:.06em;text-transform:uppercase}

@media(max-width:1200px){.slot-grid{grid-template-columns:repeat(5,1fr)}.garage-list[data-scale="2"] .slot-grid{grid-template-columns:repeat(5,1fr)}.garage-list[data-scale="3"] .slot-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:900px){
  .site-header{padding:12px 16px}.header-tagline{display:none}
  .toolbar{padding:10px 16px}.app-body{padding:16px 16px 80px}
  .stat-grid{grid-template-columns:repeat(3,1fr)}
  .slot-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
@media(max-width:540px){.stat-grid{grid-template-columns:1fr 1fr}.slot-grid{grid-template-columns:1fr 1fr}.garage-meta{display:none}}

function migrateCollection(c){

function buildDisplayGroups(properties){
  const groups=[],processed=new Set();
  for(let i=0;i<properties.length;i++){
    if(processed.has(i))continue;
    const p=properties[i],gInfo=GARAGE_GROUPS[p.id];
    if(gInfo){
      const siblings=[];
      for(let j=i;j<properties.length;j++){
        const gj=GARAGE_GROUPS[properties[j].id];
        if(gj&&gj.group===gInfo.group){siblings.push({prop:properties[j],propIdx:j,floor:gj});processed.add(j)}
      }
      siblings.sort((a,b)=>a.floor.order-b.floor.order);
      groups.push({type:'group',label:gInfo.label,siblings,theme:siblings[0].prop.theme});
    }else{processed.add(i);groups.push({type:'single',prop:p,propIdx:i})}
  }
  return groups;
}

function PropertyManager({isOpen,onClose,collection,onUpdate}){
  const[addId,setAddId]=useState('');const[dIdx,setDIdx]=useState(null);const[oIdx,setOIdx]=useState(null);
  const[propQ,setPropQ]=useState('');const[propFocus,setPropFocus]=useState(-1);const[propOpen,setPropOpen]=useState(false);
  const propInputRef=useRef(null);
  const available=useMemo(()=>{const used=new Set(collection.properties.map(p=>p.id));return PROP_CATALOG.filter(p=>!used.has(p.id)).sort((a,b)=>a.name.localeCompare(b.name))},[collection]);
  const filteredProps=useMemo(()=>{if(!propQ.trim())return available;const q=propQ.toLowerCase();return available.filter(p=>p.name.toLowerCase().includes(q)||(p.location&&p.location.toLowerCase().includes(q))||(p.subCategory&&p.subCategory.replace(/-/g,' ').toLowerCase().includes(q)))},[available,propQ]);
  function selectProp(prop){setAddId(prop.id);setPropQ(prop.name+' ('+prop.capacity+')');setPropOpen(false);setPropFocus(-1)}
  function addProperty(){const prop=PROP_CATALOG.find(p=>p.id===addId);if(!prop)return;onUpdate({...collection,properties:[...collection.properties,{id:prop.id,name:prop.name,capacity:prop.capacity,theme:null,slots:Array(prop.capacity).fill(null)}]});setAddId('');setPropQ('');setPropFocus(-1)}
  function handlePropKey(e){
    if(!propOpen)return;
    if(e.key==='ArrowDown'){e.preventDefault();setPropFocus(f=>Math.min(f+1,filteredProps.length-1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setPropFocus(f=>Math.max(f-1,0))}
    else if(e.key==='Enter'&&propFocus>=0&&propFocus<filteredProps.length){e.preventDefault();selectProp(filteredProps[propFocus])}
    else if(e.key==='Escape'){setPropOpen(false)}
  }
  function removeProperty(idx){
    const g=collection.properties[idx];const gInfo=GARAGE_GROUPS[g.id];
    if(gInfo){const groupId=gInfo.group;const toRemove=[];collection.properties.forEach((p,i)=>{const gi=GARAGE_GROUPS[p.id];if(gi&&gi.group===groupId)toRemove.push(i)});const totalFilled=toRemove.reduce((acc,i)=>acc+collection.properties[i].slots.filter(s=>s!==null).length,0);if(totalFilled>0&&!confirm(`Remove entire "${gInfo.label}"? It has ${totalFilled} vehicle(s).`))return;onUpdate({...collection,properties:collection.properties.filter((_,i)=>!toRemove.includes(i))});return}
    const filled=g.slots.filter(s=>s!==null).length;if(filled>0&&!confirm(`Remove "${g.name}"? It has ${filled} vehicle(s).`))return;const np=[...collection.properties];np.splice(idx,1);onUpdate({...collection,properties:np});
  }
  function handleDrop(idx){
    if(dIdx===null||dIdx===idx){setDIdx(null);setOIdx(null);return}
    const dp=collection.properties[dIdx];const gInfo=GARAGE_GROUPS[dp.id];
    if(gInfo){const gid=gInfo.group;const gi=[];collection.properties.forEach((p,i)=>{const g=GARAGE_GROUPS[p.id];if(g&&g.group===gid)gi.push(i)});const items=gi.map(i=>collection.properties[i]);const rem=collection.properties.filter((_,i)=>!gi.includes(i));let ins=idx-gi.filter(i=>i<idx).length;if(ins<0)ins=0;if(ins>rem.length)ins=rem.length;rem.splice(ins,0,...items);onUpdate({...collection,properties:rem})}
    else{const np=[...collection.properties];const[m]=np.splice(dIdx,1);np.splice(idx>dIdx?idx-1:idx,0,m);onUpdate({...collection,properties:np})}
    setDIdx(null);setOIdx(null);
  }
  const displayItems=useMemo(()=>{const items=[],seen=new Set();collection.properties.forEach((p,i)=>{if(seen.has(i))return;const gInfo=GARAGE_GROUPS[p.id];if(gInfo){const gid=gInfo.group;const sibs=[];collection.properties.forEach((pp,j)=>{const gj=GARAGE_GROUPS[pp.id];if(gj&&gj.group===gid){sibs.push({prop:pp,idx:j});seen.add(j)}});const tc=sibs.reduce((a,s)=>a+s.prop.capacity,0);const tf=sibs.reduce((a,s)=>a+s.prop.slots.filter(x=>x!==null).length,0);items.push({type:'group',label:gInfo.label,totalCap:tc,totalFilled:tf,propIdx:sibs[0].idx})}else{seen.add(i);items.push({type:'single',name:p.name,cap:p.capacity,filled:p.slots.filter(s=>s!==null).length,propIdx:i})}});return items},[collection]);

  const propWrapRef=useRef(null);
  useEffect(()=>{if(!isOpen)return;function h(e){if(propWrapRef.current&&!propWrapRef.current.contains(e.target))setPropOpen(false)}document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[isOpen]);

  if(!isOpen)return null;
  return(<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}><div className="modal">
    <div className="modal-head"><div className="modal-title">Manage Properties</div><div className="modal-sub">Drag ⠿ to reorder · grouped garages move together</div></div>
    <button className="modal-close" onClick={onClose}>×</button>
    <div className="prop-list">{displayItems.map((item)=>{
      const idx=item.propIdx;const isG=item.type==='group';
      return(<div key={idx} className={`prop-item${dIdx===idx?' prop-dragging':''}${oIdx===idx?' prop-drag-over':''}`} draggable onDragStart={()=>setDIdx(idx)} onDragOver={e=>{e.preventDefault();setOIdx(idx)}} onDrop={()=>handleDrop(idx)} onDragEnd={()=>{setDIdx(null);setOIdx(null)}}>
        <span className="prop-item-grip">⠿</span>
        <div className="prop-item-name">{isG?item.label:item.name}{isG&&<span style={{color:'var(--gold-dim)',fontSize:'10px',marginLeft:'4px'}}>(connected)</span>}</div>
        <div className="prop-item-cap">{isG?item.totalFilled:item.filled}/{isG?item.totalCap:item.cap}</div>
        <button className="prop-item-btn remove" onClick={()=>removeProperty(idx)}>×</button>
      </div>)
    })}</div>
    <div className="prop-add-section">
      <div style={{fontFamily:'var(--mono)',fontSize:'9px',color:'var(--gold)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'8px'}}>Add Property</div>
      <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
        <div className="prop-search-wrap" ref={propWrapRef}>
          <input ref={propInputRef} className="prop-search-input" placeholder="Type to search properties..." value={propQ} onChange={e=>{setPropQ(e.target.value);setAddId('');setPropOpen(true);setPropFocus(-1)}} onFocus={()=>setPropOpen(true)} onKeyDown={handlePropKey}/>
          {propOpen&&<div className="prop-dropdown">
            {filteredProps.length===0?<div className="prop-dropdown-empty">No matching properties</div>
            :filteredProps.map((p,i)=><div key={p.id} className={`prop-dropdown-item${i===propFocus?' focused':''}`} onMouseEnter={()=>setPropFocus(i)} onMouseDown={e=>{e.preventDefault();selectProp(p)}}>
              <span className="prop-dropdown-name">{p.name}</span>
              <span className="prop-dropdown-loc">{p.location||''}</span>
              <span className="prop-dropdown-meta">{p.capacity} slots</span>
            </div>)}
          </div>}
        </div>
        <button className="tb-btn primary" onClick={addProperty} disabled={!addId}>Add</button>
      </div>
    </div>
    <div className="modal-footer"><button className="tb-btn" onClick={onClose}>Done</button></div>
  </div></div>);
}

function IOModal({isOpen,mode,onClose,collection,onImport}){
  const[text,setText]=useState('');const[status,setStatus]=useState('');
  const fileRef=useRef(null);
  useEffect(()=>{if(isOpen&&mode==='export')setText(JSON.stringify(collection,null,2));if(isOpen)setStatus('')},[isOpen,mode]);
  function downloadFile(){
    const blob=new Blob([JSON.stringify(collection,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=`mckillsey-fleet-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    setStatus('Downloaded!');
  }
  function handleFileUpload(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);if(!d.properties)throw new Error('Missing properties');setText(JSON.stringify(d,null,2));onImport(d);setStatus('Imported from file!');setTimeout(onClose,800)}
      catch(err){setStatus('Error: '+err.message)}
    };
    reader.readAsText(file);if(fileRef.current)fileRef.current.value='';
  }
  if(!isOpen)return null;
  return(<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}><div className="modal">
    <div className="modal-head"><div className="modal-title">{mode==='export'?'Export':'Import'} Collection</div><div className="modal-sub">{mode==='export'?'Copy or download JSON to back up':'Paste or upload JSON to restore'}</div></div>
    <button className="modal-close" onClick={onClose}>×</button>
    {mode==='import'&&<><div className="io-btn-row"><label className="io-file-label" onClick={()=>fileRef.current?.click()}>↑ Upload .json file</label><input ref={fileRef} type="file" accept=".json,application/json" style={{display:'none'}} onChange={handleFileUpload}/></div><div className="io-sep">— or paste below —</div></>}
    <div style={{padding:'0 22px'}}><textarea className="io-textarea" value={text} onChange={e=>setText(e.target.value)} readOnly={mode==='export'} placeholder={mode==='import'?'Paste your collection JSON here...':''}/></div>
    <div className="modal-footer">
      <span style={{fontFamily:'var(--mono)',fontSize:'10px',color:status.includes('Error')?'var(--red)':'var(--green)',marginRight:'auto'}}>{status}</span>
      <button className="tb-btn" onClick={onClose}>Cancel</button>
      {mode==='export'&&<button className="tb-btn" onClick={downloadFile}>↓ Download</button>}
      {mode==='export'&&<button className="tb-btn primary" onClick={()=>{navigator.clipboard.writeText(text).then(()=>setStatus('Copied!'))}}>Copy</button>}
      {mode==='import'&&<button className="tb-btn primary" onClick={()=>{try{const d=JSON.parse(text);if(!d.properties)throw new Error('Missing properties');onImport(d);setStatus('Imported!');setTimeout(onClose,600)}catch(e){setStatus('Error: '+e.message)}}}>Import</button>}
    </div>
  </div></div>);
}

  if(!car)return(<div className={`slot empty${compactClass}${hl?' highlight':''}${isDragOver?' drag-over':''}`} onClick={onClick}
    onDragOver={e=>{e.preventDefault();setIsDragOver(true)}} onDragLeave={()=>setIsDragOver(false)}
    onDrop={e=>{e.preventDefault();setIsDragOver(false);if(dragRef.garageIdx!==null){onDragDrop(dragRef.garageIdx,dragRef.slotIdx,garageIdx,slotIdx);dragRef={garageIdx:null,slotIdx:null}}}}>
    <span className="slot-num">{num}</span><span className="empty-label">+ add</span></div>);

  const isHsw=dbv&&dbv.hsw;
  const carName=dbv?dbv.name:(car?.gtaName||car?.vehicleId||'Unknown');
  const isGallery=display.gallery;
  const galleryImgSrc=isGallery&&imgId?imgUrl(imgId):null;
  const[galleryLoaded,setGalleryLoaded]=useState(false);
  const[galleryFailed,setGalleryFailed]=useState(false);
  useEffect(()=>{setGalleryLoaded(false);setGalleryFailed(false)},[imgId]);
  return(<div ref={slotRef} data-img-id={imgId} className={`slot${compactClass}${hl?' highlight':''}${isDragOver?' drag-over':''}${isDupe?' dupe-flag':''}`}
    draggable={true}
    onDragStart={e=>{dragRef={garageIdx,slotIdx};hideVTip();e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','')}}
    onDragEnd={()=>{dragRef={garageIdx:null,slotIdx:null}}}
    onDragOver={e=>{e.preventDefault();setIsDragOver(true)}} onDragLeave={()=>setIsDragOver(false)}
    onDrop={e=>{e.preventDefault();setIsDragOver(false);if(dragRef.garageIdx!==null){onDragDrop(dragRef.garageIdx,dragRef.slotIdx,garageIdx,slotIdx);dragRef={garageIdx:null,slotIdx:null}}}}
    onMouseEnter={e=>{if(dbv&&dragRef.garageIdx===null)showVTip(e,dbv)}} onMouseMove={e=>{if(dbv&&dragRef.garageIdx===null)posVTip(e)}} onMouseLeave={hideVTip}>
    {isGallery&&galleryImgSrc&&!galleryFailed&&<>
      {!galleryLoaded&&<div className="gallery-img-shimmer"/>}
      <img className="gallery-img" src={galleryImgSrc} alt="" loading="lazy"
        style={galleryLoaded?{}:{opacity:0}}
        onLoad={()=>setGalleryLoaded(true)} onError={()=>setGalleryFailed(true)}/>
    </>}
    <span className="slot-num">{num}</span>
    <div className="slot-actions"><button className="slot-action-btn" onClick={e=>{e.stopPropagation();hideVTip();onRemove()}} title="Remove">×</button></div>
    {display.showMfr&&dbv&&dbv.mfr&&<div className="slot-mfr">{dbv.mfr}</div>}
    {(display.showGta||isGallery)&&<div className="slot-gta">{carName}</div>}
    {display.showIrl&&dbv&&dbv.irl&&<div className="slot-irl">{dbv.irl}</div>}
    {display.showBadges&&<div className="slot-badges">
      {isHsw&&<span className="slot-badge badge-hsw">{dbv.isHswVariant?'HSW':'HSW Eligible'}</span>}
      {dbv?.brGlass&&<span className="slot-badge badge-armor">BP</span>}
      {dbv?.expRes&&!dbv?.brGlass&&<span className="slot-badge badge-armor">Armor</span>}
      {dbv?.armored&&!dbv?.brGlass&&!dbv?.expRes&&<span className="slot-badge badge-armor">Armor</span>}
      {dbv?.wpnzed&&<span className="slot-badge badge-weapon">Wpnzd</span>}
      {dbv?.imani&&<span className="slot-badge badge-imani">{dbv.imani==='full'?'Imani':'Jammer'}</span>}
    </div>}
  </div>);
}

// ═══ GARAGE CARD ═══
function GarageCard({garages,label,sq,onUpdate,onAdd,onDragDrop,dupes,showDupes,display}){
  const[open,setOpen]=useState(true);
  const totalSlots=garages.reduce((a,g)=>a+g.prop.capacity,0);
  const totalFilled=garages.reduce((a,g)=>a+g.prop.slots.filter(s=>s!==null).length,0);
  const pct=Math.round((totalFilled/totalSlots)*100);
  const garageValue=useMemo(()=>{let v=0;garages.forEach(g=>{g.prop.slots.forEach(s=>{if(s){const d=resolveSlot(s);if(d&&d.price>0)v+=d.price}})});return v},[garages]);
  const allMatches=useMemo(()=>{if(!sq||sq.length<2)return{};const q=sq.toLowerCase(),m={};garages.forEach(g=>{m[g.propIdx]=new Set();g.prop.slots.forEach((s,i)=>{if(!s)return;const dbv=resolveSlot(s);if(!dbv)return;if(dbv.name.toLowerCase().includes(q)||(dbv.irl&&dbv.irl.toLowerCase().includes(q))||(dbv.mfr&&dbv.mfr.toLowerCase().includes(q))||(cls(dbv.cls).toLowerCase().includes(q)))m[g.propIdx].add(i)})});return m},[garages,sq]);
  const hasMatch=!sq||sq.length<2||Object.values(allMatches).some(s=>s.size>0)||label.toLowerCase().includes((sq||'').toLowerCase());
  const isGrouped=garages.length>1;
  const firstTheme=garages[0].prop.theme;
  const hasDupes=showDupes&&garages.some(g=>g.prop.slots.some((s,si)=>s&&dupes.has(`${g.propIdx}-${si}`)));

  function handleThemeChange(newTheme){
    // Apply theme to first property in group
    const idx=garages[0].propIdx;
    const p={...garages[0].prop,theme:newTheme};
    onUpdate(idx,p);
  }

  return(<div className="garage-card" style={{opacity:hasMatch?1:.25,transition:'opacity .2s'}} onDragOver={e=>e.preventDefault()}>
    <div className="garage-header" onClick={()=>setOpen(!open)}>
      <span className={`garage-chevron ${open?'open':''}`}>▸</span>
      <span className="garage-name">{label}</span>
      <EditableTheme theme={firstTheme} onChange={handleThemeChange}/>
      {garageValue>0&&<span className="garage-value">{fmt$(garageValue)}</span>}
      {hasDupes&&<span className="garage-dupe">⚠ dupe</span>}
      <div className="garage-meta">
        <span><span style={{color:'var(--cream)'}}>{totalFilled}</span>/{totalSlots}</span>
        <div className="garage-fill-bar"><div className="garage-fill-inner" style={{width:pct+'%'}}></div></div>
      </div>
    </div>
    {open&&garages.map((g,fi)=>{const matches=allMatches[g.propIdx]||new Set();return(<div key={g.propIdx}>
      {isGrouped&&<div className="floor-header">{g.floor?.floorLabel||`Floor ${fi+1}`} — {g.prop.slots.filter(s=>s!==null).length}/{g.prop.capacity}</div>}
      <div className="slot-grid">{g.prop.slots.map((car,si)=><Slot key={`${g.propIdx}-${si}`} car={car} num={si+1} garageIdx={g.propIdx} slotIdx={si} hl={matches.has(si)} isDupe={showDupes&&car&&dupes.has(`${g.propIdx}-${si}`)} display={display} onRemove={()=>{const s=[...g.prop.slots];s[si]=null;onUpdate(g.propIdx,{...g.prop,slots:s})}} onClick={()=>{if(!car)onAdd(g.propIdx,si,label)}} onDragDrop={onDragDrop}/>)}</div>
    </div>)})}
  </div>);
}

function SettingsDropdown({display,setDisplay,showDupes,setShowDupes,slotScale,setSlotScale}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{function handleClick(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false)}document.addEventListener('mousedown',handleClick);return()=>document.removeEventListener('mousedown',handleClick)},[]);
  const items=[
    {key:'showMfr',label:'Manufacturer'},
    {key:'showGta',label:'GTA Name'},
    {key:'showIrl',label:'IRL Name'},
    {key:'showBadges',label:'Badges'},
  ];
  const scaleLabels=['S','M','L','XL'];
  return(<div className={`settings-wrap${open?' open':''}`} ref={ref}>
    <button className={`tb-btn${open?' active':''}`} onClick={()=>setOpen(!open)}>⚙ View</button>
    <div className="settings-panel">
      <div className="settings-head">Slot Size</div>
      <div className="settings-slider-wrap">
        <div className="settings-slider-row">
          <input type="range" className="settings-slider" min="0" max="3" step="1" value={slotScale} onChange={e=>setSlotScale(+e.target.value)}/>
          <span className="settings-slider-val">{scaleLabels[slotScale]}</span>
        </div>
        <div className="settings-slider-labels"><span>S</span><span>M</span><span>L</span><span>XL</span></div>
      </div>
      <div className="settings-head" style={{marginTop:'8px'}}>Slot Display</div>
      {items.map(i=><label key={i.key} className="settings-item"><input type="checkbox" checked={display[i.key]} onChange={e=>setDisplay(d=>({...d,[i.key]:e.target.checked}))}/>{i.label}</label>)}
      <div className="settings-head" style={{marginTop:'8px'}}>Warnings</div>
      <label className="settings-item"><input type="checkbox" checked={showDupes} onChange={e=>setShowDupes(e.target.checked)}/> Flag Duplicates</label>
    </div>
  </div>);
}

function App(){

  useEffect(()=>{save(coll)},[coll]);
  function flash(m){setToast(m);if(toastTimeout)clearTimeout(toastTimeout);toastTimeout=setTimeout(()=>setToast(''),1800)}
  function updateG(idx,g){const p=[...coll.properties];p[idx]=g;setColl({...coll,properties:p});flash('Saved')}
  const handleDragDrop=useCallback((fGi,fSi,tGi,tSi)=>{try{if(fGi===tGi&&fSi===tSi)return;const np=coll.properties.map(g=>({...g,slots:[...g.slots]}));const fc=np[fGi].slots[fSi];const tc=np[tGi].slots[tSi];np[fGi].slots[fSi]=tc;np[tGi].slots[tSi]=fc;setColl({...coll,properties:np});if(fGi!==tGi)flash('Moved');else flash('Swapped')}catch(err){console.error('DragDrop error:',err);flash('Error: '+err.message)}},[coll]);
  const dupes=useMemo(()=>findDuplicates(coll.properties),[coll]);

  const stats=useMemo(()=>{
    let cars=0,slots=0,garages=0,totalValue=0;const cc={},mfrs={};const topCars=[];
    coll.properties.forEach(g=>{
      const f=g.slots.filter(s=>s!==null).length;cars+=f;slots+=g.capacity;if(f>0)garages++;
      g.slots.forEach(s=>{if(!s)return;const dbv=resolveSlot(s);if(dbv){cc[dbv.cls]=(cc[dbv.cls]||0)+1;if(dbv.mfr)mfrs[dbv.mfr]=(mfrs[dbv.mfr]||0)+1;if(dbv.price>0){totalValue+=dbv.price;topCars.push({name:dbv.name,price:dbv.price})}}});
    });
    const classRank=Object.entries(cc).sort((a,b)=>b[1]-a[1]);
    const mfrRank=Object.entries(mfrs).sort((a,b)=>b[1]-a[1]);
    topCars.sort((a,b)=>b.price-a.price);
    return{cars,slots,garages,pct:slots?Math.round(cars/slots*100):0,classRank,mfrRank,totalValue,topCars:topCars.slice(0,10),mfrCount:Object.keys(mfrs).length};
  },[coll]);

  const displayGroups=useMemo(()=>{
    const groups=buildDisplayGroups(coll.properties);
    if(!hideEmpty)return groups;
    return groups.filter(g=>g.type==='single'?g.prop.slots.some(s=>s!==null):g.siblings.some(s=>s.prop.slots.some(x=>x!==null)));
  },[coll,hideEmpty]);

  return(<>
    <header className="site-header">

      <span className="header-tagline">Fleet Management · Los Santos · Blaine County</span>
    </header>
    <div className="toolbar">
      <div className="toolbar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Search vehicles, garages, manufacturers..." value={sq} onChange={e=>setSq(e.target.value)}/>
      </div>
      <button className={`tb-btn ${hideEmpty?'active':''}`} onClick={()=>setHideEmpty(!hideEmpty)}>{hideEmpty?'◉ Hide empty':'○ Show all'}</button>
      <button className={`tb-btn ${display.gallery?'active':''}`} onClick={()=>setDisplay(d=>({...d,gallery:!d.gallery}))}>{display.gallery?'◉ Gallery':'○ Gallery'}</button>
      <button className="tb-btn" onClick={()=>setPropMgr(true)}>Properties</button>
      <SettingsDropdown display={display} setDisplay={setDisplay} showDupes={showDupes} setShowDupes={setShowDupes} slotScale={slotScale} setSlotScale={setSlotScale}/>
      <button className="tb-btn" onClick={()=>setIo('export')}>Export</button>
      <button className="tb-btn" onClick={()=>setIo('import')}>Import</button>
      <button className="tb-btn danger" onClick={()=>{if(confirm('Reset to default?')){setColl(JSON.parse(JSON.stringify(DEFAULT_COLL)));flash('Reset')}}}>Reset</button>
    </div>
    <div className="app-body">
      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-value gold">{stats.cars}<span style={{fontSize:'11px',color:'var(--cream-dim)',fontWeight:400}}>/{stats.slots}</span></div>
          <div className="stat-label">Vehicles · {stats.pct}% Full</div>
        </div>
        <div className="stat-card hoverable">
          <div className="stat-value" style={{fontFamily:'var(--mono)'}}>{stats.classRank[0]?cls(stats.classRank[0][0]):'—'}</div>
          <div className="stat-label">Top Class ({stats.classRank[0]?stats.classRank[0][1]:0}) · hover for all</div>
          <div className="stat-pop">
            <div className="stat-pop-head">Classes by Count</div>
            {stats.classRank.map(([c,n])=><div key={c} className="stat-pop-row"><span className="pop-name">{cls(c)}</span><span className="pop-val">{n}</span></div>)}
          </div>
        </div>
        <div className="stat-card hoverable">
          <div className="stat-value">{stats.mfrCount}</div>
          <div className="stat-label">Manufacturers · hover for list</div>
          <div className="stat-pop">
            <div className="stat-pop-head">Manufacturers by Count</div>
            {stats.mfrRank.map(([m,n])=><div key={m} className="stat-pop-row"><span className="pop-name">{m}</span><span className="pop-val">{n}</span></div>)}
          </div>
        </div>
        <div className="stat-card"><div className="stat-value">{stats.garages}</div><div className="stat-label">Active Garages</div></div>
        <div className="stat-card hoverable">
          <div className="stat-value green">{stats.totalValue>=1e9?'$'+(stats.totalValue/1e9).toFixed(2)+'B':stats.totalValue>=1e6?'$'+(stats.totalValue/1e6).toFixed(1)+'M':fmt$(stats.totalValue)}</div>
          <div className="stat-label">Fleet MSRP · hover for top 10</div>
          <div className="stat-pop">
            <div className="stat-pop-head">Most Expensive</div>
            {stats.topCars.map((c,i)=><div key={i} className="stat-pop-row"><span className="pop-name">{c.name}</span><span className="pop-val">{fmt$(c.price)}</span></div>)}
          </div>
        </div>
      </div>
      <div className={`garage-list${display.gallery?' gallery-mode':''}`} style={{'--sb':slotScale*2+'px'}} data-scale={slotScale} onDragOver={e=>e.preventDefault()}>
        {displayGroups.map((g,i)=>{
          if(g.type==='single')return <GarageCard key={g.prop.id+'-'+g.propIdx} garages={[{prop:g.prop,propIdx:g.propIdx,floor:null}]} label={g.prop.name} sq={sq} dupes={dupes} showDupes={showDupes} display={display} onUpdate={(idx,u)=>updateG(idx,u)} onAdd={(gi,si,lbl)=>setPicker({gi,si,label:lbl})} onDragDrop={handleDragDrop}/>;
          return <GarageCard key={g.label+'-'+i} garages={g.siblings.map(s=>({prop:s.prop,propIdx:s.propIdx,floor:s.floor}))} label={g.label} sq={sq} dupes={dupes} showDupes={showDupes} display={display} onUpdate={(idx,u)=>updateG(idx,u)} onAdd={(gi,si,lbl)=>setPicker({gi,si,label:lbl})} onDragDrop={handleDragDrop}/>;
        })}
      </div>
    </div>
    <VehiclePicker isOpen={!!picker} onClose={()=>setPicker(null)} label={picker?.label} onSelect={v=>{if(!picker)return;const g=coll.properties[picker.gi];const s=[...g.slots];s[picker.si]={vehicleId:v.vehicleId};updateG(picker.gi,{...g,slots:s});flash('Added '+v.name)}}/>
    <PropertyManager isOpen={propMgr} onClose={()=>setPropMgr(false)} collection={coll} onUpdate={c=>{setColl(c);flash('Properties updated')}}/>
    <IOModal isOpen={!!io} mode={io} onClose={()=>setIo(null)} collection={coll} onImport={d=>{setColl(d);flash('Imported')}}/>
    <Toast message={toast}/>
    <div style={{padding:'16px 32px 24px',borderTop:'1px solid var(--rule)',marginTop:32,fontFamily:'var(--mono)',fontSize:9,color:'var(--cream-dim)',letterSpacing:'.04em',lineHeight:1.8}}>
      <span style={{color:'var(--gold-dim)'}}><sup>1</sup></span> Lap times and top speeds sourced from <a href="https://gtacars.net" target="_blank" rel="noopener" style={{color:'var(--gold-dim)',textDecoration:'underline',textUnderlineOffset:2}}>Broughy1322 / gtacars.net</a>. Tested on PC with max upgrades on the standard test track. See <a href="https://www.youtube.com/@Broughy1322" target="_blank" rel="noopener" style={{color:'var(--gold-dim)',textDecoration:'underline',textUnderlineOffset:2}}>his YouTube channel</a> for methodology and full testing videos.
    </div>
  </>);
}
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null}}
  static getDerivedStateFromError(e){return{error:e}}
  componentDidCatch(e,info){console.error('React crash:',e,info)}
  render(){if(this.state.error)return React.createElement('div',{style:{padding:40,fontFamily:'var(--mono)',color:'var(--red)',fontSize:13}},
    React.createElement('h2',{style:{color:'var(--gold)',marginBottom:12}},'Something crashed'),
    React.createElement('pre',{style:{color:'var(--cream-dim)',whiteSpace:'pre-wrap'}},this.state.error.toString()),
    React.createElement('button',{onClick:()=>this.setState({error:null}),style:{marginTop:12,padding:'8px 16px',background:'var(--gold)',color:'var(--navy)',border:'none',cursor:'pointer',fontFamily:'var(--mono)'}},'Try again'));
    return this.props.children}
}

// Fetch DB and transform to ultra format
(async()=>{
  try{
    const DB_URL='/cars/db.json';
    const res=await fetch(DB_URL);
    if(!res.ok)throw new Error('Failed to load '+DB_URL+' ('+res.status+')');
    const fullDb=await res.json();
    
    const STORABLE=new Set(['CAR','MOTORCYCLE','BIKE','QUADBIKE','AMPHIBIOUS_AUTOMOBILE','AMPHIBIOUS_QUADBIKE','SUBMARINECAR','BICYCLE']);
    const DLC_SHORT={'TitleUpdate':'Launch','mpbeach':'Beach Bum','mpbusiness':'Business','mpbusiness2':'Business 2','mpchristmas2':'Festive Surprise','mphipster':"I'm Not a Hipster",'mpindependence':'Independence Day','mppilot':'Flight School','mpvalentines':'Be My Valentine','mpvalentines2':'Be My Valentine','mpheist':'Heists','mpluxe':'Ill-Gotten Gains','mpluxe2':'Ill-Gotten Gains 2','mplowrider':'Lowriders','mplowrider2':'Lowriders: Custom Classics','mpexecutive':'Finance & Felony','mpstunt':'Cunning Stunts','mpbiker':'Bikers','mpimportexport':'Import/Export','mpgunrunning':'Gunrunning','mpsmuggler':"Smuggler's Run",'mpchristmas2017':'Doomsday Heist','mpchristmas2018':'Arena War','mpheist3':'Diamond Casino Heist','mpheist4':'Cayo Perico','mpvinewood':'Diamond Casino','mpsum':'LS Summer Special','mpsum2':'Criminal Enterprises','mptuner':'Los Santos Tuners','mpsecurity':'The Contract','mpfixer':'The Contract','mp2023_01':'LS Drug Wars','mp2023_02':'SA Mercenaries','mp2024_01':'Bottom Dollar Bounties','mp2024_02':'Agents of Sabotage','mp2024_03':'Money Fronts','mpg9ec':'Enhanced','mpsum2_g9ec':'Enhanced','mp2025_01':'Mansions','mp2025_02':'mp2025_02','mpbattle':'After Hours','mpassault':'Southern SA Super Sport','mpspecialraces':'Special Vehicle Circuit','mpjanuary2016':'January 2016','mplts':'Last Team Standing','spupgrade':'spupgrade','mphalloween':'Halloween','mpxmas_604490':'Festive 2015','mpapartment':'Executives & Other Criminals'};
    
    RAW_V=fullDb.filter(v=>STORABLE.has(v.type)).map(v=>{
      const gf=v.flags||[];
      let flags='';
      if(v.irlName)flags+='I';
      if(v.hsw)flags+='H';
      if(v.id&&v.id.endsWith('_hsw'))flags+='h';
      if(v.imaniTech==='full')flags+='F';
      else if(v.imaniTech==='jammer')flags+='J';
      if(gf.includes('BULLET_RESISTANT_GLASS')||gf.includes('CAPPED_EXPLOSION_DAMAGE')||gf.includes('FLAG_DISABLE_THROUGH_WINDSCREEN'))flags+='A';
      if(gf.includes('BULLET_RESISTANT_GLASS'))flags+='B';
      if(gf.includes('CAPPED_EXPLOSION_DAMAGE'))flags+='E';
      if(v.weapons&&v.weapons.length)flags+='W';
      if(v.convertible)flags+='C';
      const dlc=DLC_SHORT[v.dlc]||v.dlc||'';
      return[v.displayName,v.manufacturer||'',v.class||'',flags,v.irlName||'',v.price>100?v.price:0,v.seats||0,dlc,v.scImageId||v.id||'',v.lapTime||null,v.topSpeed||null,v.id||''];
    });
    
    // Re-init VEHICLES array
    VEHICLES.length=0;
    RAW_V.forEach((v,i)=>VEHICLES.push({
      idx:i,name:v[0],mfr:v[1],cls:v[2],flags:v[3]||'',
      irl:v[4]||null,price:v[5]||0,seats:v[6]||0,dlc:v[7]||'',
      imgId:v[8]||'',lapTime:v[9]||null,topSpeed:v[10]||null,
      vehicleId:v[11]||v[8]||'',
      hsw:(v[3]||'').includes('H'),
      isHswVariant:(v[3]||'').includes('h'),
      imani:(v[3]||'').includes('F')?'full':(v[3]||'').includes('J')?'jammer':null,
      armored:(v[3]||'').includes('A'),brGlass:(v[3]||'').includes('B'),expRes:(v[3]||'').includes('E'),
      wpnzed:(v[3]||'').includes('W'),convertible:(v[3]||'').includes('C'),
    }));
    // Rebuild lookup
    VEHICLES.forEach(v=>{VEH_BY_NAME[v.name.toLowerCase()]=v;VEH_BY_ID[v.vehicleId]=v;const c=v.name.replace(/\s*\(HSW\)\s*$/i,'').trim().toLowerCase();if(c!==v.name.toLowerCase())VEH_BY_NAME[c]=v});
    
    // Now render the real app
    ReactDOM.render(React.createElement(ErrorBoundary,null,React.createElement(App,null)),document.getElementById('root'));
  }catch(err){
    ReactDOM.render(React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'var(--mono)',color:'var(--red)',fontSize:13,gap:12}},
      React.createElement('div',null,'Failed to load vehicle database'),
      React.createElement('div',{style:{color:'var(--cream-dim)',fontSize:11}},err.message),
      React.createElement('div',{style:{color:'var(--cream-dim)',fontSize:10,marginTop:8}},'Make sure /cars/db.json is accessible')
    ),document.getElementById('root'));
  }
})()
</script>
</body>
</html>
